const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

const DEMO_CHECKINS = [
  '2026-01-08','2026-01-13','2026-01-22',
  '2026-02-03','2026-02-10','2026-02-17','2026-02-26',
  '2026-03-05','2026-03-12','2026-03-19','2026-03-28',

function parseISO(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function isoDay(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isoWeek(d) {
  const t = new Date(d.valueOf()); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - ((t.getDay()+6)%7));
  const w1 = new Date(t.getFullYear(),0,4);
  return 1 + Math.round(((t-w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
}
function isWinter(d) { const m = d.getMonth(); return m===11||m===0||m===1; }
function dateFmtShort(d) { return d.toLocaleDateString('de-CH',{day:'2-digit',month:'short'}); }

function weekStreaks(checkinSet) {
  const weeks = new Set();
  for (const s of checkinSet) { const d=parseISO(s); weeks.add(`${d.getFullYear()}-W${isoWeek(d)}`); }
  const sorted = [...weeks].sort();
  let longest=0, cur=0, last=null;
  for (const k of sorted) {
    const wn = Number(k.split('-W')[1]);
    if (last!==null && wn===last+1) cur+=1; else cur=1;
    longest = Math.max(longest,cur); last=wn;
  }
  return longest;
}

const BADGES = [
  { id:'erste',   label:'Erstbegehung',  hint:'Dein erster Besuch',              glyph:'1',   palette:['#6b7a4b','#3d4527'], condition:(s)=>s.total>=1,              earnedISO:(s)=>s.sortedDays[0] },
  { id:'funf',    label:'5 Besuche',     hint:'Fünf gestempelte Tage',           glyph:'V',   palette:['#7a6a4f','#3f3520'], condition:(s)=>s.total>=5,              earnedISO:(s)=>s.sortedDays[4] },
  { id:'zehn',    label:'10 Besuche',    hint:'Zehn Besuche dieses Jahr',        glyph:'X',   palette:['#6b6862','#2b2925'], condition:(s)=>s.total>=10,             earnedISO:(s)=>s.sortedDays[9] },
  { id:'xxv',     label:'25 Besuche',    hint:'Halbzeitmedaille',                glyph:'XXV', palette:['#a48a5b','#4e3d1f'], condition:(s)=>s.total>=25,             earnedISO:(s)=>s.sortedDays[24] },
  { id:'funfzig', label:'50 Besuche',    hint:'Jahresziel — fünfzig Besuche',   glyph:'L',   palette:['#b3543a','#5a2515'], condition:(s)=>s.total>=50,             earnedISO:(s)=>s.sortedDays[49] },
  { id:'streak3', label:'Drei Wochen',   hint:'Drei Wochen in Folge',            glyph:'≡',   palette:['#b3543a','#5a2515'], condition:(s)=>s.longestStreak>=3,      earnedISO:(s)=>s.sortedDays[s.sortedDays.length-1] },
  { id:'winter',  label:'Winter-Boulder',hint:'Besuch im Dez., Jan. oder Feb.', glyph:'✻',   palette:['#4a5a6a','#1e2530'], condition:(s)=>s.winterCount>0,         earnedISO:(s)=>s.firstWinter },
  { id:'spring',  label:'Tauwetter',     hint:'Erster Besuch im März',           glyph:'✿',   palette:['#6b7a4b','#3d4527'], condition:(s)=>s.sortedDays.some((d)=>parseISO(d).getMonth()===2), earnedISO:(s)=>s.sortedDays.find((d)=>parseISO(d).getMonth()===2) },
  { id:'doppel',  label:'Doppelpack',    hint:'Zweimal in einer Woche',          glyph:'II',  palette:['#6b6862','#2b2925'], condition:(s)=>s.doubleWeek,            earnedISO:(s)=>s.doubleWeekISO },
  { id:'sammler', label:'Stammgast',     hint:'Jeden Monat mind. einmal',        glyph:'✦',   palette:['#7a6a4f','#3f3520'], condition:(s)=>s.monthsHit>=11,         earnedISO:(s)=>s.sortedDays[s.sortedDays.length-1] },
];

function computeStats(checkins) {
  const set = new Set(checkins);
  const sortedDays = [...set].sort();
  const total = sortedDays.length;
  const longestStreak = weekStreaks(set);
  const monthsSet = new Set(sortedDays.map((d)=>parseISO(d).getMonth()));
  const monthsHit = monthsSet.size;
  const winterDays = sortedDays.filter((d)=>isWinter(parseISO(d)));
  const winterCount = winterDays.length;
  const firstWinter = winterDays[0];
  const weekCounts = {}; let doubleWeekISO = null;
  for (const d of sortedDays) {
    const k = `${parseISO(d).getFullYear()}-W${isoWeek(parseISO(d))}`;
    weekCounts[k] = (weekCounts[k]||0)+1;
    if (weekCounts[k]===2 && !doubleWeekISO) doubleWeekISO = d;
  }
  const weeksVisited = new Set(sortedDays.map((d)=>isoWeek(parseISO(d))));
  return { sortedDays, total, longestStreak, monthsHit, winterCount, firstWinter, doubleWeek:!!doubleWeekISO, doubleWeekISO, weeksVisited };
}

function earnedBadges(stats) {
  return BADGES.map((b)=>({ ...b, earned:b.condition(stats), earnedISO:b.condition(stats)?b.earnedISO(stats):null }));
}

function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x:16, y:16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type==='__activate_edit_mode') setOpen(true);
      else if (e?.data?.type==='__deactivate_edit_mode') setOpen(false);
    };
    const onKey = (e) => {
      if (e.key==='?' && !e.target.closest('input,textarea,select')) {
        window.dispatchEvent(new MessageEvent('message', { data:{ type:'__activate_edit_mode' } }));
      }
    };
    const gearBtn = document.getElementById('tweaks-btn');
    const onGear = () => window.dispatchEvent(new MessageEvent('message', { data:{ type:'__activate_edit_mode' } }));
    window.addEventListener('message', onMsg);
    window.addEventListener('keydown', onKey);
    if (gearBtn) gearBtn.addEventListener('click', onGear);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => {
      window.removeEventListener('message', onMsg);
      window.removeEventListener('keydown', onKey);
      if (gearBtn) gearBtn.removeEventListener('click', onGear);
    };
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY;
    const startRight=window.innerWidth-r.right, startBottom=window.innerHeight-r.bottom;
    const move=(ev)=>{ offsetRef.current={x:startRight-(ev.clientX-sx),y:startBottom-(ev.clientY-sy)}; panel.style.right=offsetRef.current.x+'px'; panel.style.bottom=offsetRef.current.y+'px'; };
    const up=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right:offsetRef.current.x, bottom:offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const opts = options.map((o)=>(typeof o==='object'?o:{value:o,label:o}));

  const n = opts.length;
  return (

          <button key={o.value} type="button" onClick={()=>onChange(o.value)}>{o.label}</button>
        ))}
      </div>
    </div>
  );
}

function AlpinBadge({ badge, size=96, earned=true }) {
  const id = React.useId().replace(/:/g,'');
  const r=size/2;
  const [top,bottom]=badge.palette;
  const c1=earned?top:'#bbb3a4', c2=earned?bottom:'#8e8676';
  const cream='#f6f0e1', ink=earned?'#29261b':'#857c6b';
  const RING_R=r*0.96, BOUT=r*0.88, BIN=r*0.74, FIELD=r*0.72;
  return (
    <div style={{ width:size, height:size, filter:earned?'none':'opacity(.7)', transition:'filter .25s' }}>
      <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} style={{ display:'block' }}>
        <defs>
          <path id={`bt-${id}`} d={`M ${r-BOUT*0.95} ${r} A ${BOUT*0.95} ${BOUT*0.95} 0 0 0 ${r+BOUT*0.95} ${r}`} fill="none"/>
          <radialGradient id={`fg-${id}`} cx="50%" cy="38%" r="65%">
            <stop offset="0%" stopColor={c1}/><stop offset="100%" stopColor={c2}/>
          </radialGradient>
        </defs>
        <circle cx={r} cy={r} r={RING_R} fill={cream} stroke={ink} strokeOpacity={earned?0.85:0.35} strokeWidth={size*0.012}/>
        <path d={`M ${r-BOUT} ${r} A ${BOUT} ${BOUT} 0 0 1 ${r+BOUT} ${r} L ${r+BIN} ${r} A ${BIN} ${BIN} 0 0 0 ${r-BIN} ${r} Z`} fill={c1}/>
        <path d={`M ${r-BOUT} ${r} A ${BOUT} ${BOUT} 0 0 0 ${r+BOUT} ${r} L ${r+BIN} ${r} A ${BIN} ${BIN} 0 0 1 ${r-BIN} ${r} Z`} fill={c2}/>
        <circle cx={r} cy={r} r={BOUT} fill="none" stroke={ink} strokeOpacity="0.35" strokeWidth="0.5"/>
        <circle cx={r} cy={r} r={BIN} fill="none" stroke={ink} strokeOpacity="0.3" strokeWidth="0.5"/>
        <circle cx={r} cy={r} r={FIELD} fill={`url(#fg-${id})`}/>
        {[0,90,180,270].map((deg)=>{
          const a=(deg-90)*Math.PI/180;
          return <line key={deg} x1={r+Math.cos(a)*BIN} y1={r+Math.sin(a)*BIN} x2={r+Math.cos(a)*BOUT} y2={r+Math.sin(a)*BOUT} stroke={cream} strokeOpacity="0.65" strokeWidth="1"/>;
        })}
        <text fontFamily="Newsreader,serif" fontSize={size*0.075} fontWeight="500" letterSpacing={size*0.04} fill={cream} opacity="0.85">
          <textPath href={`#bt-${id}`} xlinkHref={`#bt-${id}`} startOffset="50%" textAnchor="middle">· MMXXVI ·</textPath>
        </text>
        <g transform={`translate(${r-FIELD*0.78},${r-FIELD*0.78}) scale(${FIELD*1.56/24})`}>
          {EMBLEMS[badge.id]?EMBLEMS[badge.id](cream):<text x="12" y="17" textAnchor="middle" fontFamily="Newsreader,serif" fontSize="14" fill={cream}>{badge.glyph}</text>}
        </g>
      </svg>
    </div>
  );
}

function VizHeatmap({ stats, accent, todayISO }) {
  const days=new Set(stats.sortedDays);
  const months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return (
    <div style={{ fontFamily:'system-ui,-apple-system,sans-serif', padding:'12px 16px 0' }}>
      <div style={{ display:'grid', gridTemplateColumns:'24px repeat(31,1fr)', rowGap:5, columnGap:2, alignItems:'center' }}>
        <div/>
        {[...Array(31)].map((_,i)=>(
          <div key={i} style={{ fontSize:8, color:'rgba(41,38,27,0.32)', textAlign:'center', height:10, lineHeight:'10px' }}>
            {(i+1)%5===0||i===0?i+1:''}
          </div>
        ))}
        {months.map((m,mi)=>{
          const dim=new Date(YEAR,mi+1,0).getDate();
          return (
            <React.Fragment key={m}>
              <div style={{ fontSize:10, color:'rgba(41,38,27,0.55)', fontWeight:500, letterSpacing:'.02em', paddingRight:4, textAlign:'right' }}>{m}</div>
              {[...Array(31)].map((_,di)=>{
                if (di>=dim) return <div key={di}/>;
                const iso=`${YEAR}-${String(mi+1).padStart(2,'0')}-${String(di+1).padStart(2,'0')}`;
                const hit=days.has(iso), isToday=iso===todayISO, future=iso>todayISO;
                return (
                  <div key={di} style={{ width:'100%', aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ width:hit?'85%':'40%', aspectRatio:'1', borderRadius:'50%', background:hit?accent:(future?'transparent':'rgba(41,38,27,0.08)'), border:isToday&&!hit?`1px dashed ${accent}`:'none', boxShadow:isToday&&hit?`0 0 0 2px rgba(41,38,27,0.12)`:'none', transition:'background .25s' }}/>
                  </div>
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function VizYearline({ stats, accent, todayISO }) {
  const todayWeek=isoWeek(parseISO(todayISO));
  const weeks=stats.weeksVisited;
  const perWeek={};
  for (const d of stats.sortedDays) { const w=isoWeek(parseISO(d)); perWeek[w]=(perWeek[w]||0)+1; }
  return (
    <div style={{ padding:'20px 22px 8px', fontFamily:'system-ui,-apple-system,sans-serif' }}>
      <div style={{ display:'flex', alignItems:'flex-end', height:110, gap:2, position:'relative' }}>
        {[...Array(52)].map((_,i)=>{
          const w=i+1, count=perWeek[w]||0, hit=weeks.has(w), future=w>todayWeek, isCurrent=w===todayWeek;
          const h=future?14:(hit?24+Math.min(count,4)*18:14);
          return <div key={i} style={{ flex:1, height:h, background:hit?accent:(future?'rgba(41,38,27,0.05)':'rgba(41,38,27,0.1)'), borderRadius:2, outline:isCurrent?'1px dashed rgba(41,38,27,0.4)':'none', outlineOffset:2, transition:'height .3s,background .25s' }}/>;
        })}
      </div>
      <div style={{ display:'flex', marginTop:12, fontSize:10, color:'rgba(41,38,27,0.5)', fontFamily:'Newsreader,serif' }}>
        {['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'].map((m)=>(
          <div key={m} style={{ flex:1, textAlign:'left' }}>{m}</div>
        ))}
      </div>
    </div>
  );
}

function VizBook({ stats, accent }) {
  const days=stats.sortedDays;
  const byMonth={};
  for (const d of days) { const m=parseISO(d).getMonth(); (byMonth[m]=byMonth[m]||[]).push(d); }
  const months=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  return (
    <div style={{ margin:'14px 16px 0', background:'#fbf6e9', borderRadius:6, border:'0.5px solid rgba(41,38,27,0.15)', boxShadow:'0 1px 0 rgba(41,38,27,0.04),0 2px 8px rgba(41,38,27,0.06)', padding:'18px 18px 22px', position:'relative', backgroundImage:'repeating-linear-gradient(to bottom,transparent 0,transparent 21px,rgba(41,38,27,0.05) 21px,rgba(41,38,27,0.05) 22px)', fontFamily:'Newsreader,serif' }}>
      <div style={{ position:'absolute', left:32, top:8, bottom:8, width:1, background:'rgba(179,84,58,0.25)' }}/>
      <div style={{ fontSize:11, letterSpacing:'.14em', color:'rgba(41,38,27,0.55)', fontFamily:'system-ui,sans-serif', textTransform:'uppercase', marginBottom:6 }}>Heft Nr. 1 · {YEAR}</div>
      <div style={{ display:'flex', flexWrap:'wrap', gap:'10px 18px', paddingLeft:22 }}>
        {Object.keys(byMonth).map((mi)=>(
          <div key={mi} style={{ minWidth:72 }}>
            <div style={{ fontSize:11, color:'rgba(41,38,27,0.6)', fontStyle:'italic', marginBottom:3 }}>{months[Number(mi)]}</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
              {byMonth[mi].map((d)=>{
                const day=parseISO(d).getDate();
                return <span key={d} style={{ display:'inline-block', fontSize:13, fontVariantNumeric:'oldstyle-nums', color:accent, border:`1.2px solid ${accent}`, borderRadius:3, padding:'1px 5px 0', transform:`rotate(${(day*7%5)-2}deg)`, background:'rgba(251,246,233,0.4)' }}>{day}.</span>;

        <div style={{ margin:'4px 16px 0' }}>
          <div style={{ background:'#fbf8f1', borderRadius:18, border:'0.5px solid rgba(41,38,27,0.1)', boxShadow:'0 1px 0 rgba(255,255,255,0.6) inset,0 6px 24px rgba(41,38,27,0.07)', padding:'18px 18px 18px 14px', display:'flex', alignItems:'center', gap:16, position:'relative', overflow:'hidden' }}>
            <div style={{ position:'absolute', top:10, right:14, fontFamily:'Newsreader,serif', fontSize:10, fontStyle:'italic', letterSpacing:'.06em', color:'rgba(41,38,27,0.4)' }}>zuletzt verdient</div>
            <AlpinBadge badge={latest} size={110} earned/>
            <div style={{ flex:1, minWidth:0, paddingTop:8 }}>
              <div style={{ fontFamily:'Newsreader,serif', fontSize:22, fontWeight:500, color:'#29261b', letterSpacing:'-0.01em', lineHeight:1.1 }}>{latest.label}</div>
              <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:14, color:'rgba(41,38,27,0.6)', marginTop:6, lineHeight:1.4 }}>{latest.hint}.</div>
              {latest.earnedISO&&<div style={{ fontFamily:'system-ui', fontSize:11, letterSpacing:'.06em', textTransform:'uppercase', color:'rgba(41,38,27,0.5)', fontWeight:600, marginTop:10 }}>Eingestempelt · {dateFmtShort(parseISO(latest.earnedISO))}</div>}
            </div>
          </div>
        </div>
      )}
      {rest.length>0&&(
        <div style={{ padding:'24px 8px 0' }}>
          <div style={{ padding:'0 14px' }}><SectionLabel>Weitere Anstecker</SectionLabel></div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'20px 8px', marginTop:16, padding:'0 8px' }}>
            {rest.map((b)=><BadgeCell key={b.id} badge={b}/>)}
          </div>
        </div>
      )}
      {locked.length>0&&(
        <div style={{ padding:'28px 8px 0' }}>
          <div style={{ padding:'0 14px' }}><SectionLabel>Noch offen</SectionLabel></div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'20px 8px', marginTop:16, padding:'0 8px' }}>
            {locked.map((b)=><LockedCell key={b.id} badge={b}/>)}
          </div>
        </div>
      )}
    </div>
  );
}

function MiniHeatmap({ stats, accent }) {
  const days=new Set(stats.sortedDays);
  return (
    <div style={{ display:'grid', gridTemplateColumns:'14px repeat(31,1fr)', rowGap:2, columnGap:1 }}>
      {['J','F','M','A','M','J','J','A','S','O','N','D'].map((m,mi)=>(
        <React.Fragment key={mi}>
          <div style={{ fontSize:8, color:'rgba(41,38,27,0.4)', fontFamily:'Newsreader,serif', fontStyle:'italic', textAlign:'right', paddingRight:3 }}>{m}</div>
          {[...Array(31)].map((_,di)=>{
            const dim=new Date(YEAR,mi+1,0).getDate();
            if (di>=dim) return <div key={di}/>;
            const iso=`${YEAR}-${String(mi+1).padStart(2,'0')}-${String(di+1).padStart(2,'0')}`;
            return <div key={di} style={{ aspectRatio:'1', background:days.has(iso)?accent:'rgba(41,38,27,0.07)', borderRadius:1 }}/>;
          })}
        </React.Fragment>
      ))}
    </div>
  );
}

function JahrScreen({ stats, badges, accent }) {
  const earned=badges.filter((b)=>b.earned);
  const highlight=earned.slice(-4);
  return (
    <div style={{ paddingBottom:110 }}>
      <div style={{ padding:'64px 20px 14px' }}>
        <div style={{ fontSize:12, letterSpacing:'.12em', color:'rgba(41,38,27,0.5)', textTransform:'uppercase', fontFamily:'system-ui', fontWeight:600 }}>Jahr</div>
        <div style={{ fontSize:13, color:'rgba(41,38,27,0.55)', marginTop:4, fontFamily:'Newsreader,serif', fontStyle:'italic' }}>Eine Karte zum Behalten oder Teilen.</div>
      </div>
      <div style={{ padding:'8px 16px 16px' }}>
        <div style={{ background:'#fbf8f1', borderRadius:22, padding:'28px 24px 22px', border:'0.5px solid rgba(41,38,27,0.12)', boxShadow:'0 1px 0 rgba(255,255,255,0.5) inset,0 18px 50px rgba(41,38,27,0.14)', position:'relative', overflow:'hidden' }}>
          <div style={{ position:'absolute', top:14, right:14, fontFamily:'Newsreader,serif', fontSize:11, letterSpacing:'.2em', color:'rgba(41,38,27,0.45)' }}>MMXXVI</div>
          <div style={{ fontFamily:'Newsreader,serif', fontSize:13, fontStyle:'italic', color:'rgba(41,38,27,0.6)' }}>Dein Boulder-Jahr</div>
          <div style={{ fontFamily:'Newsreader,serif', fontSize:84, fontWeight:400, color:'#29261b', fontVariantNumeric:'oldstyle-nums', letterSpacing:'-0.03em', lineHeight:0.95, marginTop:10 }}>{stats.total}</div>
          <div style={{ fontFamily:'system-ui', fontSize:14, letterSpacing:'.04em', color:'rgba(41,38,27,0.6)', marginTop:4 }}>Besuche · {stats.monthsHit} Monate · {stats.longestStreak} Wochen Streak</div>
          <div style={{ marginTop:22, marginBottom:8 }}><MiniHeatmap stats={stats} accent={accent}/></div>
          <div style={{ borderTop:'0.5px solid rgba(41,38,27,0.15)', marginTop:16, paddingTop:14 }}>
            <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:15, color:'#29261b', lineHeight:1.4 }}>«Der Berg kennt deinen Namen.»</div>
          </div>
          <div style={{ display:'flex', gap:10, marginTop:18, justifyContent:'flex-start' }}>
            {highlight.map((b)=><AlpinBadgeMini key={b.id} badge={b} size={42}/>)}
            {highlight.length<earned.length&&<div style={{ display:'flex', alignItems:'center', fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:12, color:'rgba(41,38,27,0.55)', marginLeft:4 }}>+{earned.length-highlight.length} weitere</div>}
          </div>
        </div>
        <div style={{ display:'flex', gap:10, marginTop:14 }}>
          <button style={{ flex:1, padding:'14px 0', background:'#29261b', color:'#f6f2ea', border:0, borderRadius:14, fontFamily:'system-ui', fontSize:14, fontWeight:600, letterSpacing:'.01em', cursor:'pointer' }}>Bild speichern</button>
          <button style={{ padding:'14px 18px', background:'transparent', color:'#29261b', border:'0.5px solid rgba(41,38,27,0.25)', borderRadius:14, fontFamily:'system-ui', fontSize:14, fontWeight:500, cursor:'pointer' }}>Teilen</button>
        </div>
      </div>
    </div>
  );
}

function BottomNav({ tab, setTab }) {
  const items=[
    { id:'sammeln', label:'Sammeln', icon:<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M3 4.5C3 4.224 3.224 4 3.5 4H10v14H4.5C3.672 18 3 17.328 3 16.5V4.5Z" stroke="currentColor" strokeWidth="1.4"/><path d="M19 4.5C19 4.224 18.776 4 18.5 4H12v14H17.5C18.328 18 19 17.328 19 16.5V4.5Z" stroke="currentColor" strokeWidth="1.4"/></svg> },
    { id:'erfolge', label:'Erfolge', icon:<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="9" r="5.5" stroke="currentColor" strokeWidth="1.4"/><path d="M7.5 13L6 19l5-2.5L16 19l-1.5-6" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/></svg> },
    { id:'jahr', label:'Jahr', icon:<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="3.5" y="4.5" width="15" height="14" rx="2" stroke="currentColor" strokeWidth="1.4"/><path d="M3.5 9h15" stroke="currentColor" strokeWidth="1.4"/><path d="M7 3v3M15 3v3" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round"/></svg> },
  ];
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'8px 10px 22px', background:'rgba(246,242,234,0.85)', backdropFilter:'blur(20px) saturate(160%)', WebkitBackdropFilter:'blur(20px) saturate(160%)', borderTop:'0.5px solid rgba(41,38,27,0.12)', display:'flex', zIndex:5 }}>
      {items.map((it)=>(
        <button key={it.id} onClick={()=>setTab(it.id)} style={{ flex:1, padding:'8px 0 4px', background:'transparent', border:0, display:'flex', flexDirection:'column', alignItems:'center', gap:3, cursor:'pointer', opacity:tab===it.id?1:0.42, transition:'opacity .2s' }}>
          <div style={{ color:'#29261b' }}>{it.icon}</div>
          <div style={{ fontFamily:'system-ui', fontSize:10, fontWeight:600, letterSpacing:'.04em', color:'#29261b', textTransform:'uppercase' }}>{it.label}</div>
        </button>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// MOMENTS
// ─────────────────────────────────────────────────────────────
function Onboarding({ onDone, accent }) {
  const [step, setStep]=React.useState(0);
  const [goal, setGoal]=React.useState(40);
  const slides=[
    { eyebrow:'Willkommen', title:'Ein Jahr,\nein Sammelbuch.', body:'Jeder Besuch ist ein Stempel. Mehr nicht.\n\nKeine Routen, keine Grade, kein Zeitdruck — nur du, der Tag, der Tritt.', cta:'Weiter' },
    { eyebrow:'Ritual', title:'Ein Klick\nnach der Halle.', body:'Heim, Schuhe aus, App auf, ein Tap.\n\nDie Seite raschelt, das Datum wird gestempelt, das Jahr füllt sich.', cta:'Weiter' },
    { eyebrow:'Jahresziel', title:'Wie oft\ndieses Jahr?', body:'Setz dir eine ruhige Zahl. Du kannst sie jederzeit ändern.', cta:'Los geht\'s', picker:true },
  ];
  const s=slides[step];
  return (
    <div style={{ position:'absolute', inset:0, zIndex:100, background:'#f6f2ea', display:'flex', flexDirection:'column', padding:'54px 28px 36px' }}>
      <div style={{ display:'flex', gap:6, marginTop:16 }}>
        {slides.map((_,i)=><div key={i} style={{ flex:1, height:2, background:i<=step?'#29261b':'rgba(41,38,27,0.15)', borderRadius:1, transition:'background .25s' }}/>)}
      </div>
      <div style={{ flex:1, display:'flex', flexDirection:'column', justifyContent:'center', paddingBottom:40 }}>
        <div style={{ fontSize:12, letterSpacing:'.16em', color:'rgba(41,38,27,0.5)', textTransform:'uppercase', fontFamily:'system-ui', fontWeight:600 }}>{s.eyebrow}</div>
        <div style={{ fontFamily:'Newsreader,serif', fontSize:44, fontWeight:400, color:'#29261b', letterSpacing:'-0.02em', lineHeight:1.05, whiteSpace:'pre-line', marginTop:14 }}>{s.title}</div>
        <div style={{ fontFamily:'Newsreader,serif', fontSize:17, color:'rgba(41,38,27,0.7)', lineHeight:1.5, whiteSpace:'pre-line', marginTop:22, maxWidth:320 }}>{s.body}</div>
        {s.picker&&(
          <div style={{ marginTop:28 }}>
            <div style={{ display:'flex', alignItems:'baseline', gap:8 }}>
              <div style={{ fontFamily:'Newsreader,serif', fontSize:80, fontWeight:400, color:'#29261b', fontVariantNumeric:'oldstyle-nums', letterSpacing:'-0.02em', lineHeight:1 }}>{goal}</div>
              <div style={{ fontFamily:'Newsreader,serif', fontSize:17, fontStyle:'italic', color:'rgba(41,38,27,0.55)' }}>Besuche</div>
            </div>
            <input type="range" min="10" max="120" step="5" value={goal} onChange={(e)=>setGoal(Number(e.target.value))} style={{ width:'100%', marginTop:18, accentColor:accent }}/>
            <div style={{ display:'flex', justifyContent:'space-between', fontSize:11, color:'rgba(41,38,27,0.4)', fontFamily:'system-ui', marginTop:4 }}>
              <span>gemütlich</span><span>ambitioniert</span>
            </div>
          </div>
        )}
      </div>
      <button onClick={()=>{ if (step===slides.length-1) onDone(goal); else setStep(step+1); }} style={{ padding:'18px 24px', background:'#29261b', color:'#f6f2ea', border:0, borderRadius:16, fontFamily:'Newsreader,serif', fontSize:19, fontWeight:500, letterSpacing:'-0.005em', cursor:'pointer', boxShadow:'0 12px 30px rgba(41,38,27,0.18)' }}>{s.cta}</button>
      {step<slides.length-1&&<button onClick={()=>onDone(40)} style={{ marginTop:12, padding:'8px 0', background:'transparent', border:0, fontFamily:'system-ui', fontSize:13, color:'rgba(41,38,27,0.5)', cursor:'pointer' }}>überspringen</button>}
    </div>
  );
}

function StampMotion({ phase, todayDate, accent }) {
  const day=todayDate.getDate();
  const month=todayDate.toLocaleDateString('de-CH',{month:'short'}).toUpperCase();
  return (
    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ width:180, height:180, border:`3px solid ${accent}`, borderRadius:'50%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', color:accent, transform:phase==='in'?'scale(2.4) rotate(-12deg)':'scale(1) rotate(-6deg)', opacity:phase==='in'?0:1, transition:'transform .35s cubic-bezier(.5,1.5,.5,1),opacity .25s', filter:phase==='settle'?'url(#ink-rough)':'none', position:'relative' }}>
        <div style={{ fontFamily:'Newsreader,serif', fontSize:56, fontWeight:500, fontVariantNumeric:'oldstyle-nums', lineHeight:1 }}>{day}</div>
        <div style={{ fontFamily:'system-ui', fontSize:14, fontWeight:700, letterSpacing:'.18em', marginTop:4 }}>{month}</div>
        <div style={{ position:'absolute', bottom:14, fontFamily:'system-ui', fontSize:9, letterSpacing:'.2em', opacity:0.7 }}>MMXXVI</div>
        <div style={{ position:'absolute', top:-3, left:-3, right:-3, bottom:-3, border:`1px solid ${accent}`, borderRadius:'50%', opacity:0.5 }}/>
      </div>
    </div>
  );
}

function FillMotion({ phase, todayDate, accent }) {
  const day=todayDate.getDate();
  return (
    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style={{ position:'absolute', width:220, height:220, borderRadius:'50%', background:accent, transform:phase==='in'?'scale(0.05)':'scale(1)', opacity:phase==='in'?0:1, transition:'transform .7s cubic-bezier(.2,.8,.3,1),opacity .3s' }}/>
      <div style={{ position:'relative', zIndex:1, fontFamily:'Newsreader,serif', fontSize:88, fontWeight:400, color:'#fbf8f1', fontVariantNumeric:'oldstyle-nums', opacity:phase==='in'?0:1, transform:phase==='in'?'translateY(6px)':'translateY(0)', transition:'opacity .35s .35s,transform .4s .3s' }}>{day}</div>
    </div>
  );
}

function RustleMotion({ phase, todayDate, accent }) {
  const day=todayDate.getDate();
  const month=todayDate.toLocaleDateString('de-CH',{month:'long'});
  return (
    <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
      {[0,1,2].map((i)=>(
        <div key={i} style={{ position:'absolute', width:240, height:200, background:'#fbf6e9', border:'0.5px solid rgba(41,38,27,0.15)', borderRadius:4, boxShadow:'0 2px 6px rgba(41,38,27,0.08)', transform:phase==='in'?`translateY(${30-i*10}px) rotate(${-2+i*2}deg)`:`translateY(${-6+i*4}px) rotate(${-3+i*3}deg)`, opacity:phase==='in'?0:(1-i*0.25), transition:`transform .${5+i}s cubic-bezier(.3,.7,.4,1),opacity .35s`, zIndex:3-i }}/>
      ))}
      <div style={{ position:'relative', zIndex:10, textAlign:'center', opacity:phase==='in'?0:1, transform:phase==='in'?'translateY(20px)':'translateY(0)', transition:'opacity .4s .25s,transform .5s .2s' }}>
        <div style={{ fontFamily:'Newsreader,serif', fontSize:80, fontWeight:400, color:accent, fontVariantNumeric:'oldstyle-nums', letterSpacing:'-0.02em', lineHeight:1 }}>{day}</div>
        <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:17, color:'rgba(41,38,27,0.7)', marginTop:2 }}>{month}</div>
      </div>
    </div>
  );
}

function CheckinMoment({ motion, total, todayDate, accent, onDone }) {
  const [phase, setPhase]=React.useState('in');
  React.useEffect(()=>{
    const t1=setTimeout(()=>setPhase('settle'),900);
    const t2=setTimeout(()=>setPhase('out'),2400);
    const t3=setTimeout(onDone,2900);
    return ()=>[t1,t2,t3].forEach(clearTimeout);
  },[onDone]);
  return (
    <div style={{ position:'absolute', inset:0, zIndex:200, background:'rgba(246,242,234,0.96)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity:phase==='out'?0:1, transition:'opacity .4s' }}>
      <div style={{ position:'relative', width:280, height:280 }}>
        {motion==='stamp'&&<StampMotion phase={phase} todayDate={todayDate} accent={accent}/>}
        {motion==='fill'&&<FillMotion phase={phase} todayDate={todayDate} accent={accent}/>}
        {motion==='rustle'&&<RustleMotion phase={phase} todayDate={todayDate} accent={accent}/>}
      </div>
      <div style={{ fontFamily:'Newsreader,serif', fontSize:26, fontStyle:'italic', color:'#29261b', textAlign:'center', marginTop:14, opacity:phase==='settle'?1:0, transform:phase==='settle'?'translateY(0)':'translateY(8px)', transition:'opacity .4s .2s,transform .4s .2s' }}>Nice.</div>
      <div style={{ fontFamily:'system-ui', fontSize:14, color:'rgba(41,38,27,0.55)', marginTop:6, opacity:phase==='settle'?1:0, transition:'opacity .4s .35s' }}>#{total} dieses Jahr</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────
const ACCENT_OPTIONS = ['#6b6862','#6b7a4b','#b3543a','#4a5a6a'];

function loadAppData() {
  try {
    return {
      checkins: JSON.parse(localStorage.getItem(`sb-checkins-${YEAR}`) || '[]'),
      goal: JSON.parse(localStorage.getItem('sb-goal') || '40'),
      accent: localStorage.getItem('sb-accent') || '#6b6862',
      onboarded: !!localStorage.getItem('sb-onboarded'),
    };
  } catch { return { checkins:[], goal:40, accent:'#6b6862', onboarded:false }; }
}

function App() {
  const [tab, setTab]=React.useState('sammeln');
  const [viz, setViz]=React.useState('heat');
  const [motion, setMotion]=React.useState('stamp');
  const [showDemo, setShowDemo]=React.useState(false);
  const [appData, setAppData]=React.useState(loadAppData);
  const [checkinActive, setCheckinActive]=React.useState(false);
  const [onboardingActive, setOnboardingActive]=React.useState(!loadAppData().onboarded);

  // Remove loading indicator once React has mounted
  React.useEffect(() => { document.getElementById('loading')?.remove(); }, []);

  const todayISO=isoDay(TODAY);

  const activeCheckins=React.useMemo(()=>{
    if (showDemo) return DEMO_CHECKINS;
    return appData.checkins;
  },[showDemo,appData.checkins]);

  const stats=React.useMemo(()=>computeStats(activeCheckins),[activeCheckins]);
  const badges=React.useMemo(()=>earnedBadges(stats),[stats]);
  const checkedInToday=activeCheckins.includes(todayISO);

  const onCheckin=()=>{ if (!showDemo && !checkedInToday) setCheckinActive(true); };
  const onCheckinDone=()=>{
    setCheckinActive(false);
    if (!showDemo && !checkedInToday) {
      const next=[...new Set([...appData.checkins,todayISO])];
      localStorage.setItem(`sb-checkins-${YEAR}`,JSON.stringify(next));
      setAppData((d)=>({...d,checkins:next}));
    }
  };

  const setGoal=(goal)=>{
    localStorage.setItem('sb-goal',JSON.stringify(goal));
    setAppData((d)=>({...d,goal}));
  };
  const setAccent=(accent)=>{
    localStorage.setItem('sb-accent',accent);
    setAppData((d)=>({...d,accent}));
  };
  const resetAll=()=>{
    localStorage.removeItem(`sb-checkins-${YEAR}`);
    localStorage.removeItem('sb-goal');
    localStorage.removeItem('sb-accent');
    localStorage.removeItem('sb-onboarded');
    setAppData({checkins:[],goal:40,accent:'#6b6862',onboarded:false});
    setOnboardingActive(true);
  };

  return (
    <IOSDevice width={402} height={874}>
      <div style={{ position:'absolute', inset:0, background:'#f6f2ea', color:'#29261b', overflow:'hidden' }}>
        <div style={{ position:'absolute', inset:0, overflowY:'auto', overflowX:'hidden', WebkitOverflowScrolling:'touch' }}>
          {tab==='sammeln'&&<SammelnScreen stats={stats} accent={appData.accent} viz={viz} setViz={setViz} goal={appData.goal} onCheckin={onCheckin} checkedInToday={checkedInToday} todayISO={todayISO} showDemo={showDemo}/>}
          {tab==='erfolge'&&<ErfolgeScreen stats={stats} badges={badges}/>}
          {tab==='jahr'&&<JahrScreen stats={stats} badges={badges} accent={appData.accent}/>}
        </div>
        <BottomNav tab={tab} setTab={setTab}/>
        {checkinActive&&<CheckinMoment motion={motion} total={stats.total+(checkedInToday?0:1)} todayDate={TODAY} accent={appData.accent} onDone={onCheckinDone}/>}
        {onboardingActive&&<Onboarding accent={appData.accent} onDone={(goal)=>{ setGoal(goal); localStorage.setItem('sb-onboarded','1'); setAppData((d)=>({...d,onboarded:true,goal})); setOnboardingActive(false); }}/>}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Stil">
          <TweakColor label="Akzent" value={appData.accent} options={ACCENT_OPTIONS} onChange={setAccent}/>
        </TweakSection>
        <TweakSection label="Visualisierung">
          <TweakRadio label="Ansicht" value={viz} options={[{value:'heat',label:'Kal.'},{value:'line',label:'Linie'},{value:'book',label:'Heft'}]} onChange={setViz}/>
          <TweakSlider label="Jahresziel" value={appData.goal} min={10} max={120} step={5} unit=" Bes." onChange={setGoal}/>
        </TweakSection>
        <TweakSection label="Check-in">
          <TweakRadio label="Animation" value={motion} options={[{value:'stamp',label:'Stempel'},{value:'fill',label:'Füllen'},{value:'rustle',label:'Rascheln'}]} onChange={setMotion}/>
          <TweakButton label="Vorschau abspielen" onClick={()=>setCheckinActive(true)} secondary/>
        </TweakSection>
        <TweakSection label="Daten">
          <TweakToggle label="Demo-Daten anzeigen" value={showDemo} onChange={setShowDemo}/>
          <TweakButton label="Alles zurücksetzen" secondary onClick={resetAll}/>
        </TweakSection>
      </TweaksPanel>
    </IOSDevice>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
