function toRoman(n) {
  const map=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let r=''; for (const [v,s] of map) { while (n>=v) { r+=s; n-=v; } } return r;
}
const ROMAN_YEAR = toRoman(YEAR);

// Check-ins eines Jahres aus localStorage lesen (Schlüssel pro Jahr: sb-checkins-<jahr>)
function loadCheckins(year) {
  try { return JSON.parse(localStorage.getItem(`sb-checkins-${year}`) || '[]'); } catch { return []; }
}

}

// ── Farben: Akzent zu 'leicht' (heller, Richtung Papier) / 'stark' (dunkler, Richtung Tinte) mischen ──
const PAPER='#f6f2ea', INK='#29261b';
function hexToRgb(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map((c)=>c+c).join(''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function rgbToHex(r,g,b){ return '#'+[r,g,b].map((x)=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
function mixHex(a,b,t){ const [r1,g1,b1]=hexToRgb(a),[r2,g2,b2]=hexToRgb(b); return rgbToHex(r1+(r2-r1)*t,g1+(g2-g1)*t,b1+(b2-b1)*t); }
function levelColor(accent, level){
  if (level==='leicht') return mixHex(accent, PAPER, 0.58);
  if (level==='stark')  return mixHex(accent, INK, 0.5);
  return accent; // normal
}
const LEVEL_OPTS=[{v:'leicht',label:'Leicht'},{v:'normal',label:'Normal'},{v:'stark',label:'Stark'}];

// ── Teilbare Jahres-Karte als PNG auf ein Canvas zeichnen (kein externes Lib) ──
function roundRectPath(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
async function buildYearCardBlob({ year, stats, accent, levels={} }) {
  if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch {} }
  const W=1080, H=1350, INKc='#29261b';
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#efe9dc'; ctx.fillRect(0,0,W,H);
  roundRectPath(ctx,60,70,W-120,H-150,52); ctx.fillStyle='#fbf8f1'; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle='rgba(41,38,27,0.12)'; ctx.stroke();
  const px=130;
  ctx.textAlign='right'; ctx.fillStyle='rgba(41,38,27,0.42)'; ctx.font='40px Newsreader, serif';
  ctx.fillText(toRoman(year), W-130, 205);
  ctx.textAlign='left';
  ctx.fillStyle='rgba(41,38,27,0.6)'; ctx.font='italic 42px Newsreader, serif';
  ctx.fillText(`Dein Boulder-Jahr ${year}`, px, 205);
  ctx.fillStyle=INKc; ctx.font='300 290px Newsreader, serif';
  ctx.fillText(String(stats.total), px-6, 470);
  ctx.fillStyle='rgba(41,38,27,0.62)'; ctx.font='38px -apple-system, system-ui, sans-serif';
  ctx.fillText(`Besuche · ${stats.monthsHit} Monate · ${stats.longestStreak} Wochen Streak`, px, 540);
  if (stats.sortedDays.length) { ctx.fillStyle='rgba(41,38,27,0.55)'; ctx.font='italic 36px Newsreader, serif';
    ctx.fillText(`dabei seit ${dateFmtLong(parseISO(stats.sortedDays[0]))}`, px, 600); }
  // Mini-Heatmap (12 Monate × 31 Tage)
  const days=new Set(stats.sortedDays);
  const labels=['J','F','M','A','M','J','J','A','S','O','N','D'];
  const labW=34, hx=px+labW, hy=666, cols=31, gap=7;
  const cw=(W-130-hx - gap*(cols-1))/cols, rgap=10, ch=cw;
  ctx.font='22px Newsreader, serif'; ctx.textBaseline='middle';
  for (let mi=0; mi<12; mi++) {
    const yy=hy+mi*(ch+rgap);
    ctx.fillStyle='rgba(41,38,27,0.4)'; ctx.textAlign='right';
    ctx.fillText(labels[mi], px+labW-12, yy+ch/2);
    const dim=new Date(year,mi+1,0).getDate();
    for (let di=0; di<dim; di++) {
      const iso=`${year}-${String(mi+1).padStart(2,'0')}-${String(di+1).padStart(2,'0')}`;
      const hit=days.has(iso);
      ctx.fillStyle=hit?levelColor(accent,levels[iso]||'normal'):'rgba(41,38,27,0.08)';
      const cx=hx+di*(cw+gap)+cw/2, cy=yy+ch/2;
      ctx.beginPath(); ctx.arc(cx,cy,cw*0.46,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
  const lineY=hy+12*(ch+rgap)+22;
  ctx.strokeStyle='rgba(41,38,27,0.15)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(px,lineY); ctx.lineTo(W-130,lineY); ctx.stroke();
  ctx.fillStyle=INKc; ctx.font='italic 40px Newsreader, serif';
  ctx.fillText('«Der Berg kennt deinen Namen.»', px, lineY+58);
  ctx.fillStyle='rgba(41,38,27,0.4)'; ctx.font='600 24px -apple-system, system-ui, sans-serif';
  if ('letterSpacing' in ctx) ctx.letterSpacing='6px';
  ctx.fillText('SAMMELBUCH', px, H-110);
  if ('letterSpacing' in ctx) ctx.letterSpacing='0px';
  return new Promise((res)=>c.toBlob(res,'image/png'));
}
function downloadBlob(blob, name){
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}

function parseISO(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); }
function isoDay(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function isoWeek(d) {
  const t = new Date(d.valueOf()); t.setHours(0,0,0,0);
  t.setDate(t.getDate() + 3 - ((t.getDay()+6)%7));
  const w1 = new Date(t.getFullYear(),0,4);
  return 1 + Math.round(((t-w1)/86400000 - 3 + ((w1.getDay()+6)%7))/7);
}
function isWinter(d) { const m = d.getMonth(); return m===11||m===0||m===1; }
function dateFmtShort(d) { return d.toLocaleDateString('de-CH',{day:'2-digit',month:'short'}); }
function dateFmtLong(d) { return d.toLocaleDateString('de-CH',{day:'numeric',month:'long'}); }

function weekStreaks(checkinSet) {
  const weeks = new Set();
  for (const s of checkinSet) { const d=parseISO(s); weeks.add(`${d.getFullYear()}-W${isoWeek(d)}`); }
  const sorted = [...weeks].sort();
  let longest=0, cur=0, last=null;
  for (const k of sorted) {
    const wn = Number(k.split('-W')[1]);
    if (last!==null && wn===last+1) cur+=1; else cur=1;
    longest = Math.max(longest,cur); last=wn;
  }
  return longest;
}

const BADGES = [
  { id:'erste',   label:'Erstbegehung',  hint:'Dein erster Besuch',              glyph:'1',   palette:['#6b7a4b','#3d4527'], condition:(s)=>s.total>=1,              earnedISO:(s)=>s.sortedDays[0] },

  { id:'xxv',     label:'25 Besuche',    hint:'Halbzeitmedaille',                glyph:'XXV', palette:['#a48a5b','#4e3d1f'], condition:(s)=>s.total>=25,             earnedISO:(s)=>s.sortedDays[24] },
  { id:'funfzig', label:'50 Besuche',    hint:'Jahresziel — fünfzig Besuche',   glyph:'L',   palette:['#b3543a','#5a2515'], condition:(s)=>s.total>=50,             earnedISO:(s)=>s.sortedDays[49] },
  { id:'streak3', label:'Drei Wochen',   hint:'Drei Wochen in Folge',            glyph:'≡',   palette:['#b3543a','#5a2515'], condition:(s)=>s.longestStreak>=3,      earnedISO:(s)=>s.sortedDays[s.sortedDays.length-1] },
  { id:'winter',  label:'Winter-Boulder',hint:'Besuch im Dez., Jan. oder Feb.', glyph:'✻',   palette:['#4a5a6a','#1e2530'], condition:(s)=>s.winterCount>0,         earnedISO:(s)=>s.firstWinter },
  { id:'spring',  label:'Tauwetter',     hint:'Erster Besuch im März',           glyph:'✿',   palette:['#6b7a4b','#3d4527'], condition:(s)=>s.sortedDays.some((d)=>parseISO(d).getMonth()===2), earnedISO:(s)=>s.sortedDays.find((d)=>parseISO(d).getMonth()===2) },
  { id:'doppel',  label:'Doppelpack',    hint:'Zweimal in einer Woche',          glyph:'II',  palette:['#6b6862','#2b2925'], condition:(s)=>s.doubleWeek,            earnedISO:(s)=>s.doubleWeekISO },
  { id:'sammler', label:'Stammgast',     hint:'Jeden Monat mind. einmal',        glyph:'✦',   palette:['#7a6a4f','#3f3520'], condition:(s)=>s.monthsHit>=11,         earnedISO:(s)=>s.sortedDays[s.sortedDays.length-1] },
];

function computeStats(checkins) {
  const set = new Set(checkins);
  const sortedDays = [...set].sort();
  const total = sortedDays.length;
  const longestStreak = weekStreaks(set);
  const monthsSet = new Set(sortedDays.map((d)=>parseISO(d).getMonth()));
  const monthsHit = monthsSet.size;
  const winterDays = sortedDays.filter((d)=>isWinter(parseISO(d)));
  const winterCount = winterDays.length;
  const firstWinter = winterDays[0];
  const weekCounts = {}; let doubleWeekISO = null;
  for (const d of sortedDays) {
    const k = `${parseISO(d).getFullYear()}-W${isoWeek(parseISO(d))}`;
    weekCounts[k] = (weekCounts[k]||0)+1;
    if (weekCounts[k]===2 && !doubleWeekISO) doubleWeekISO = d;
  }
  const weeksVisited = new Set(sortedDays.map((d)=>isoWeek(parseISO(d))));
  return { sortedDays, total, longestStreak, monthsHit, winterCount, firstWinter, doubleWeek:!!doubleWeekISO, doubleWeekISO, weeksVisited };
}

function earnedBadges(stats) {
  return BADGES.map((b)=>({ ...b, earned:b.condition(stats), earnedISO:b.condition(stats)?b.earnedISO(stats):null }));
}

function badgeProgress(badge, stats) {
  const map = {
    funf:    { cur: stats.total,          max: 5  },
    zehn:    { cur: stats.total,          max: 10 },
    xxv:     { cur: stats.total,          max: 25 },
    funfzig: { cur: stats.total,          max: 50 },
    streak3: { cur: stats.longestStreak,  max: 3  },
    sammler: { cur: stats.monthsHit,      max: 11 },
  };
  const p = map[badge.id];
  return p ? { cur: Math.min(p.cur, p.max), max: p.max } : null;
}

// ─────────────────────────────────────────────────────────────
// BOULDERING-HOROSKOP
// ─────────────────────────────────────────────────────────────
function generateHoroskop(stats, todayISO) {
  const today = parseISO(todayISO);
  const dow = today.getDay();
  const month = today.getMonth();
  const DOW_PLURAL = ['Sonntage','Montage','Dienstage','Mittwoche','Donnerstage','Freitage','Samstage'];
  const MONTH_DE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

  const dowCounts = Array(7).fill(0);
  for (const d of stats.sortedDays) dowCounts[parseISO(d).getDay()]++;
  const bestDow = dowCounts.indexOf(Math.max(...dowCounts));

  const monthCounts = Array(12).fill(0);
  for (const d of stats.sortedDays) monthCounts[parseISO(d).getMonth()]++;
  const bestMonth = monthCounts.indexOf(Math.max(...monthCounts));

  const milestones = [5,10,25,50,75,100,150];
  const nextMilestone = milestones.find((m) => m > stats.total) || stats.total + 25;
  const toMilestone = nextMilestone - stats.total;

  const SEASONAL = [
    'Der Januar fordert Willen. Du hast ihn bewiesen.',
    'Der Februar ist kurz. Nutze ihn.',
    'Im März erwacht die Kraft.',
    'Der April ist unberechenbar — genau wie ein guter Boulder.',
    'Der Mai öffnet die Fenster. Die Halle bleibt.',
    'Im Juni brennt der Ehrgeiz. Lass ihn.',
    'Der Juli ist heiß. Ein Grund mehr, in der Halle zu schwitzen.',
    'Im August reift die Ernte. In der Halle auch.',
    'September: Die beste Bouldersaison beginnt.',
    'Oktober: Kälter draussen, wärmer in der Halle.',
    'November gehört den Entschlossenen. Du bist dabei.',
    'Dezember: Das Jahr neigt sich. Stempel ihn voll.',
  ];

  const pool = [
    () => dow === bestDow
      ? `Deine ${DOW_PLURAL[bestDow]} sind historisch stark — heute könnte dein Tag sein.`
      : `Deine stärksten Tage sind ${DOW_PLURAL[bestDow]}. Das Muster lügt nicht.`,
    () => toMilestone === 1
      ? `Besuch Nummer ${nextMilestone} wartet. Ein einziger Schritt fehlt.`
      : `Noch ${toMilestone} Besuche bis zur ${nextMilestone}. Kein Druck — aber die Zahl ruft.`,
    () => stats.longestStreak >= 2
      ? `${stats.longestStreak} Wochen am Stück — das steckt in den Muskeln. Die Form kommt schneller zurück als du denkst.`
      : `Jede Reise beginnt mit dem ersten Schritt. Oder dem ersten Tritt.`,
    () => SEASONAL[month],
    () => stats.total === 0
      ? `Der erste Besuch ist der schwerste. Und der unvergesslichste.`
      : `${stats.total} Besuche sagen mehr über dich als jedes Gespräch.`,
    () => `Dein stärkster Monat war bisher der ${MONTH_DE[bestMonth]}. Kein Zufall.`,
    () => `Die Route wartet. Sie ist dieselbe wie gestern — du nicht.`,
    () => `Nicht die schwierigste Route definiert dich. Die, die du trotzdem nochmal versuchst.`,
    () => `Ausdauer ist kein Talent. Es ist eine Entscheidung. Du hast sie ${stats.total}× getroffen.`,
    () => `Der Berg kennt deinen Namen. Heute wäre ein guter Tag, ihn zu erinnern.`,
    () => stats.monthsHit >= 6
      ? `${stats.monthsHit} verschiedene Monate — du bist keine Schönwetter-Kletterin.`
      : `Noch ${12 - stats.monthsHit} Monate fehlen für die Vollständigkeit. Der erste davon könnte heute sein.`,
    () => `Ein schlechter Tag in der Halle ist immer noch besser als ein guter Tag auf der Couch.`,
  ];

  // Tages-Seed: ändert sich täglich, bleibt den ganzen Tag gleich
  const seed = todayISO.split('-').reduce((acc, p) => acc * 31 + parseInt(p, 10), 0);
  return pool[seed % pool.length]();
}

function HoroskopCard({ stats, todayISO }) {
  const text = React.useMemo(() => generateHoroskop(stats, todayISO), [stats.total, stats.longestStreak, stats.monthsHit, todayISO]);
  return (
    <div style={{ margin:'0 18px 4px', padding:'14px 16px', background:'rgba(41,38,27,0.035)', borderRadius:14, border:'0.5px solid rgba(41,38,27,0.1)', position:'relative' }}>
      <div style={{ fontSize:9, letterSpacing:'.14em', textTransform:'uppercase', color:'rgba(41,38,27,0.38)', fontFamily:'system-ui', fontWeight:600, marginBottom:6 }}>Tageshoroskop</div>
      <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:15, color:'rgba(41,38,27,0.82)', lineHeight:1.5 }}>{text}</div>
    </div>
  );
}

function HoroskopMoment({ stats, todayISO, onDone }) {
  const [phase, setPhase] = React.useState('in');
  const text = React.useMemo(() => generateHoroskop(stats, todayISO), []);
  const today = parseISO(todayISO);
  const weekdayDE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'][today.getDay()];

  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase('settle'), 120);
    return () => clearTimeout(t1);
  }, []);

  const dismiss = React.useCallback(() => {
    setPhase('out');
    markHoroskopSeen(todayISO);
    setTimeout(onDone, 420);
  }, [onDone, todayISO]);

  // Tap anywhere oder nach 12 s auto-schliessen
  React.useEffect(() => {
    const t = setTimeout(dismiss, 12000);
    return () => clearTimeout(t);
  }, [dismiss]);

  return (
    <div onClick={dismiss} style={{ position:'absolute', inset:0, zIndex:190, background:'rgba(246,242,234,0.98)', backdropFilter:'blur(14px)', WebkitBackdropFilter:'blur(14px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 32px', opacity:phase==='out'?0:1, transform:phase==='in'?'translateY(18px)':'translateY(0)', transition:'opacity .4s,transform .4s cubic-bezier(.3,.7,.4,1)', cursor:'pointer', overflow:'hidden' }}>

      <svg width="48" height="48" viewBox="0 0 48 48" style={{ opacity:phase==='in'?0:0.22, transition:'opacity .5s .15s', marginBottom:28 }}>

    </div>
  );
}

function TweaksPanel({ title='Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x:16, y:16 });

  React.useEffect(() => {
    const onMsg = (e) => {
      if (e?.data?.type==='__activate_edit_mode') setOpen(true);
      else if (e?.data?.type==='__deactivate_edit_mode') setOpen(false);
    };
    const onKey = (e) => {
      if (e.key==='?' && !e.target.closest('input,textarea,select')) {
        window.dispatchEvent(new MessageEvent('message', { data:{ type:'__activate_edit_mode' } }));
      }
    };
    const gearBtn = document.getElementById('tweaks-btn');
    const onGear = () => window.dispatchEvent(new MessageEvent('message', { data:{ type:'__activate_edit_mode' } }));
    window.addEventListener('message', onMsg);
    window.addEventListener('keydown', onKey);
    if (gearBtn) gearBtn.addEventListener('click', onGear);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => {
      window.removeEventListener('message', onMsg);
      window.removeEventListener('keydown', onKey);
      if (gearBtn) gearBtn.removeEventListener('click', onGear);
    };
  }, []);

  // Das Zahnrad (#tweaks-btn) liegt als <body>-Kind über dem #root-Stacking-Context
  // und damit über dem Panel. Solange offen, ausblenden — sonst überdeckt es den ✕.
  React.useEffect(() => {
    const gearBtn = document.getElementById('tweaks-btn');
    if (gearBtn) gearBtn.style.display = open ? 'none' : '';
    return () => { if (gearBtn) gearBtn.style.display = ''; };
  }, [open]);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    if (e.target.closest('button')) return;   // Taps auf Bedienelemente (✕) dürfen kein Verschieben auslösen
    const panel = dragRef.current; if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx=e.clientX, sy=e.clientY;
    const startRight=window.innerWidth-r.right, startBottom=window.innerHeight-r.bottom;
    const move=(ev)=>{ offsetRef.current={x:startRight-(ev.clientX-sx),y:startBottom-(ev.clientY-sy)}; panel.style.right=offsetRef.current.x+'px'; panel.style.bottom=offsetRef.current.y+'px'; };
    const up=()=>{ window.removeEventListener('mousemove',move); window.removeEventListener('mouseup',up); };
    window.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div onClick={dismiss} style={{ position:'fixed', inset:0, zIndex:2147483645, background:'transparent' }} />
      <div ref={dragRef} className="twk-panel" style={{ right:offsetRef.current.x, bottom:offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function VizHeatmap({ stats, accent, todayISO, year=YEAR, levels={} }) {
  const days=new Set(stats.sortedDays);
  const months=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  return (
    <div style={{ fontFamily:'system-ui,-apple-system,sans-serif', padding:'12px 16px 0' }}>
      <div style={{ display:'grid', gridTemplateColumns:'24px repeat(31,1fr)', rowGap:5, columnGap:2, alignItems:'center' }}>
        <div/>
        {[...Array(31)].map((_,i)=>(
          <div key={i} style={{ fontSize:8, color:'rgba(41,38,27,0.32)', textAlign:'center', height:10, lineHeight:'10px' }}>
            {(i+1)%5===0||i===0?i+1:''}
          </div>
        ))}
        {months.map((m,mi)=>{
          const dim=new Date(year,mi+1,0).getDate();
          return (
            <React.Fragment key={m}>
              <div style={{ fontSize:10, color:'rgba(41,38,27,0.55)', fontWeight:500, letterSpacing:'.02em', paddingRight:4, textAlign:'right' }}>{m}</div>
              {[...Array(31)].map((_,di)=>{
                if (di>=dim) return <div key={di}/>;
                const iso=`${year}-${String(mi+1).padStart(2,'0')}-${String(di+1).padStart(2,'0')}`;
                const hit=days.has(iso), isToday=iso===todayISO, future=iso>todayISO;
                return (
                  <div key={di} style={{ width:'100%', aspectRatio:'1', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ width:hit?'85%':'40%', aspectRatio:'1', borderRadius:'50%', background:hit?levelColor(accent,levels[iso]||'normal'):(future?'transparent':'rgba(41,38,27,0.08)'), border:isToday&&!hit?`1px dashed ${accent}`:'none', boxShadow:isToday&&hit?`0 0 0 2px rgba(41,38,27,0.12)`:'none', transition:'background .25s' }}/>
                  </div>
                );
              })}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
}

function GradeLegend() {
  return (
    <div style={{ padding:'10px 18px 6px', display:'flex', flexWrap:'wrap', gap:'6px 12px' }}>
      {GRADES.map((g)=>(
        <div key={g.id} style={{ display:'flex', alignItems:'center', gap:5 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:g.color, flexShrink:0, border:g.id==='w'?'0.5px solid rgba(41,38,27,0.35)':'none' }}/>
          <span style={{ fontFamily:'system-ui', fontSize:10, color:'rgba(41,38,27,0.55)', whiteSpace:'nowrap' }}>{g.label}</span>
        </div>
      ))}
    </div>
  );
}

function GradeDots({ counts={} }) {
  const dots=[];
  GRADES.forEach((g)=>{
    const cnt=counts[g.id]||0;
    for(let i=0;i<cnt;i++) dots.push({color:g.color,id:`${g.id}-${i}`,isW:g.id==='w'});
  });
  if (!dots.length) return null;
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:2, justifyContent:'center', marginTop:2, maxWidth:'100%' }}>
      {dots.slice(0,6).map((d)=>(
        <div key={d.id} style={{ width:5, height:5, borderRadius:'50%', background:d.color, border:d.isW?'0.5px solid rgba(41,38,27,0.3)':'none', flexShrink:0 }}/>
      ))}
      {dots.length>6&&<div style={{ fontSize:7, color:'rgba(41,38,27,0.4)', lineHeight:'5px' }}>+</div>}
    </div>
  );
}

function VizMonth({ stats, accent, todayISO, year=YEAR, levels={}, routes={}, onToggle, onSetLevel, onSetRoutes }) {
  const set=new Set(stats.sortedDays);
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const [m,setM]=React.useState(()=> year===YEAR ? new Date().getMonth() : 0);
  const [sel,setSel]=React.useState(null);
  React.useEffect(()=>{ setM(year===YEAR ? new Date().getMonth() : 0); setSel(null); },[year]);
  const dim=new Date(year,m+1,0).getDate();
  const startDow=(new Date(year,m,1).getDay()+6)%7;
  const prefix=`${year}-${String(m+1).padStart(2,'0')}`;
  const monthCount=[...set].filter((d)=>d.startsWith(prefix)).length;
  const cells=[]; for (let i=0;i<startDow;i++) cells.push(null); for (let d=1;d<=dim;d++) cells.push(d);
  const arrow={appearance:'none',border:0,background:'transparent',color:'rgba(41,38,27,0.55)',fontSize:22,lineHeight:1,cursor:'pointer',padding:'0 8px',fontFamily:'Newsreader,serif'};
  const editable=!!onToggle;
  const goMonth=(nm)=>{ setM(nm); setSel(null); };
  const onCell=(iso,hit)=>{
    if (!editable) return;
    if (!hit) { onToggle(iso); setSel(iso); }
    else if (sel===iso) { onToggle(iso); setSel(null); }
    else setSel(iso);
  };
  return (
    <div style={{ padding:'8px 18px 4px', fontFamily:'system-ui,-apple-system,sans-serif' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
        <button type="button" style={{...arrow,opacity:m===0?0.3:1}} onClick={()=>goMonth(Math.max(0,m-1))} disabled={m===0}>‹</button>
        <div style={{ textAlign:'center' }}>
          <div style={{ fontFamily:'Newsreader,serif', fontSize:22, fontWeight:500, color:'#29261b', letterSpacing:'-0.01em', lineHeight:1.1 }}>{monthNames[m]}</div>
          <div style={{ fontSize:10, letterSpacing:'.1em', textTransform:'uppercase', color:'rgba(41,38,27,0.45)', fontWeight:600, marginTop:2 }}>{monthCount===0?'noch leer':`${monthCount} ${monthCount===1?'Besuch':'Besuche'}`}</div>
        </div>
        <button type="button" style={{...arrow,opacity:m===11?0.3:1}} onClick={()=>goMonth(Math.min(11,m+1))} disabled={m===11}>›</button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:4 }}>
        {['Mo','Di','Mi','Do','Fr','Sa','So'].map((w,i)=>(
          <div key={i} style={{ textAlign:'center', fontSize:10, fontWeight:600, letterSpacing:'.04em', color:'rgba(41,38,27,0.4)', paddingBottom:2 }}>{w}</div>
        ))}
        {cells.map((d,i)=>{
          if (d===null) return <div key={i}/>;
          const iso=`${prefix}-${String(d).padStart(2,'0')}`;
          const hit=set.has(iso), isToday=iso===todayISO, future=iso>todayISO, isSel=sel===iso;
          const fill=hit?levelColor(accent, levels[iso]||'normal'):'transparent';
          const dayRoutes=routes[iso];
          const circle=(
            <div style={{ width:'82%', aspectRatio:'1', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center',
              background:fill, border:isToday&&!hit?`1.2px dashed ${accent}`:'none',
              fontFamily:'Newsreader,serif', fontVariantNumeric:'oldstyle-nums', fontSize:16,
              color:hit?'#f6f0e1':(future?'rgba(41,38,27,0.28)':'rgba(41,38,27,0.7)'),
              boxShadow:isSel?`0 0 0 2px ${accent}`:(hit?'0 1px 4px rgba(41,38,27,0.18)':'none'), transition:'background .25s,color .25s,box-shadow .15s' }}>{d}</div>
          );
          const cellInner=(
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:'100%' }}>
              {circle}
              {hit&&dayRoutes&&<GradeDots counts={dayRoutes}/>}
            </div>
          );
          if (editable && !future) {
            return (
              <button key={i} type="button" onClick={()=>onCell(iso,hit)}
                style={{ display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:2, paddingBottom:4, border:0, background:'transparent', padding:0, cursor:'pointer', WebkitTapHighlightColor:'transparent', minHeight:38 }}>{cellInner}</button>
            );
          }
          return <div key={i} style={{ display:'flex', alignItems:'flex-start', justifyContent:'center', paddingTop:2, paddingBottom:4, minHeight:38 }}>{cellInner}</div>;
        })}
      </div>
      <GradeLegend/>
      {editable && onSetLevel && sel && (
        <div style={{ marginTop:14, padding:'12px 14px', background:'#fbf8f1', borderRadius:14, border:'0.5px solid rgba(41,38,27,0.12)' }}>
          <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:8 }}>
            <span style={{ fontFamily:'Newsreader,serif', fontSize:15, color:'#29261b' }}>{dateFmtLong(parseISO(sel))} · Anstrengung</span>
            <button type="button" onClick={()=>{ onToggle(sel); setSel(null); }} style={{ appearance:'none', border:0, background:'transparent', color:'rgba(179,84,58,0.85)', fontSize:12, fontWeight:600, cursor:'pointer' }}>Entfernen</button>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            {LEVEL_OPTS.map((o)=>{
              const on=(levels[sel]||'normal')===o.v;
              return (
                <button key={o.v} type="button" onClick={()=>onSetLevel(sel,o.v)}
                  style={{ flex:1, padding:'9px 0', borderRadius:999, border:on?`1px solid ${accent}`:'0.5px solid rgba(41,38,27,0.2)',
                    background:on?accent:'rgba(41,38,27,0.04)', color:on?'#f6f0e1':'#29261b', fontSize:13, fontWeight:500, cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:6 }}>
                  <span style={{ width:9, height:9, borderRadius:'50%', background:on?'#f6f0e1':levelColor(accent,o.v) }}/>{o.label}
                </button>
              );
            })}
          </div>
          {onSetRoutes&&(
            <div style={{ marginTop:12 }}>
              <div style={{ fontSize:11, letterSpacing:'.08em', textTransform:'uppercase', color:'rgba(41,38,27,0.45)', fontWeight:600, marginBottom:8 }}>Levels</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
                {GRADES.map((g)=>{
                  const cnt=(routes[sel]||{})[g.id]||0;
                  return (
                    <button key={g.id} type="button" onClick={()=>{
                      const cur=routes[sel]||{};
                      const next=((cur[g.id]||0)+1)%4;
                      const updated=next===0?Object.fromEntries(Object.entries(cur).filter(([k])=>k!==g.id)):{...cur,[g.id]:next};
                      onSetRoutes(sel,updated);
                    }} style={{ display:'flex', alignItems:'center', gap:5, padding:'6px 10px', borderRadius:999,
                      border:cnt>0?`1px solid ${g.color}`:'0.5px solid rgba(41,38,27,0.18)',
                      background:cnt>0?g.color+'22':'transparent', cursor:'pointer', WebkitTapHighlightColor:'transparent' }}>
                      <div style={{ width:10, height:10, borderRadius:'50%', background:g.color, border:g.id==='w'?'0.5px solid rgba(41,38,27,0.3)':'none' }}/>
                      <span style={{ fontSize:11, fontWeight:600, color:'#29261b' }}>{g.short}</span>
                      {cnt>0&&<div style={{ display:'flex', gap:2 }}>
                        {[1,2,3].map((i)=><div key={i} style={{ width:5, height:5, borderRadius:'50%', background:cnt>=i?g.color:'rgba(41,38,27,0.15)', border:cnt>=i&&g.id==='w'?'0.5px solid rgba(41,38,27,0.3)':'none' }}/>)}
                      </div>}
                    </button>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Stat({ label, value, hint }) {
  return (
    <div>
      <div style={{ fontSize:11, letterSpacing:'.08em', textTransform:'uppercase', color:'rgba(41,38,27,0.5)', fontFamily:'system-ui', fontWeight:500 }}>{label}</div>
      <div style={{ fontFamily:'Newsreader,serif', fontSize:32, fontWeight:400, color:'#29261b', lineHeight:1.05, fontVariantNumeric:'oldstyle-nums', letterSpacing:'-0.01em', marginTop:2 }}>{value}</div>
      {hint&&<div style={{ fontSize:11, color:'rgba(41,38,27,0.45)', marginTop:2 }}>{hint}</div>}
    </div>
  );
}

function VizSegment({ value, onChange }) {
  const opts=[{v:'heat',label:'Jahr'},{v:'month',label:'Monat'}];
  return (
    <div style={{ display:'flex', gap:0, margin:'0 16px', padding:3, background:'rgba(41,38,27,0.06)', borderRadius:10, position:'relative' }}>
      <div style={{ position:'absolute', top:3, bottom:3, left:`calc(3px + ${opts.findIndex((o)=>o.v===value)} * (100% - 6px) / ${opts.length})`, width:`calc((100% - 6px) / ${opts.length})`, background:'#fbf8f1', borderRadius:8, boxShadow:'0 0.5px 0 rgba(41,38,27,0.08),0 1px 3px rgba(41,38,27,0.08)', transition:'left .2s cubic-bezier(.3,.7,.4,1)' }}/>
      {opts.map((o)=>(
        <button key={o.v} onClick={()=>onChange(o.v)} style={{ flex:1, padding:'7px 0', background:'transparent', border:0, fontFamily:'system-ui', fontSize:13, fontWeight:500, color:value===o.v?'#29261b':'rgba(41,38,27,0.55)', position:'relative', zIndex:1, cursor:'pointer' }}>{o.label}</button>
      ))}
    </div>
  );
}

function SammelnScreen({ stats, accent, viz, setViz, goal, onCheckin, checkedInToday, todayISO, showDemo, year=YEAR, levels={}, routes={}, onToggleDay, onSetLevel, onNachtragen }) {
  const remaining=Math.max(0,goal-stats.total);
  const goalPct=Math.min(100,Math.round((stats.total/goal)*100));
  const viewingPast=year!==YEAR;
  const btnDisabled=checkedInToday||showDemo||viewingPast;
  return (
    <div style={{ paddingBottom:110 }}>
      <div style={{ padding:'64px 20px 14px', display:'flex', alignItems:'baseline', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:12, letterSpacing:'.12em', color:'rgba(41,38,27,0.5)', textTransform:'uppercase', fontFamily:'system-ui', fontWeight:600 }}>Sammelbuch</div>
          <div style={{ fontFamily:'Newsreader,serif', fontSize:38, fontWeight:400, color:'#29261b', fontVariantNumeric:'oldstyle-nums', letterSpacing:'-0.015em', marginTop:1 }}>{year}</div>
          {stats.sortedDays.length>0
            ? <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:13, color:'rgba(41,38,27,0.55)', marginTop:2 }}>dabei seit {dateFmtLong(parseISO(stats.sortedDays[0]))}</div>
            : <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:13, color:'rgba(41,38,27,0.45)', marginTop:2 }}>noch kein Eintrag</div>}
        </div>
        <div style={{ position:'relative', width:64, height:64 }}>
          <svg viewBox="0 0 64 64" width="64" height="64">
            <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(41,38,27,0.1)" strokeWidth="3"/>
            <circle cx="32" cy="32" r="28" fill="none" stroke={accent} strokeWidth="3" strokeDasharray={Math.PI*56} strokeDashoffset={Math.PI*56*(1-goalPct/100)} strokeLinecap="round" transform="rotate(-90 32 32)" style={{ transition:'stroke-dashoffset .5s' }}/>
          </svg>
          <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:'Newsreader,serif', fontVariantNumeric:'oldstyle-nums', color:'#29261b' }}>
            <div style={{ fontSize:18, lineHeight:1, fontWeight:500 }}>{goalPct}</div>
            <div style={{ fontSize:9, color:'rgba(41,38,27,0.45)', fontFamily:'system-ui', letterSpacing:'.06em', textTransform:'uppercase', marginTop:1 }}>Ziel</div>
          </div>
        </div>
      </div>
      <div style={{ display:'flex', gap:30, padding:'6px 20px 22px', borderBottom:'0.5px solid rgba(41,38,27,0.1)' }}>
        <Stat label="Besuche" value={stats.total}/>
        <Stat label="Streak" value={`${stats.longestStreak} W.`} hint="in Folge"/>
        <Stat label="Monate" value={`${stats.monthsHit}/12`}/>
      </div>
      <div style={{ padding:'14px 0 10px' }}>
        <HoroskopCard stats={stats} todayISO={todayISO}/>
      </div>
      <div style={{ padding:'0 0 4px' }}>
        <VizSegment value={viz} onChange={setViz}/>
      </div>
      <div style={{ minHeight:220 }}>
        {viz==='heat'&&<VizHeatmap stats={stats} accent={accent} todayISO={todayISO} year={year} levels={levels}/>}
        {viz==='month'&&<VizMonth stats={stats} accent={accent} todayISO={todayISO} year={year} levels={levels} routes={routes}/>}{/* nur Anzeige — Bearbeiten über „Vergangenen Tag nachtragen" */}
      </div>
      <div style={{ padding:'24px 20px 0' }}>
        <button onClick={onCheckin} disabled={btnDisabled} style={{ width:'100%', padding:'20px 24px', background:btnDisabled?'rgba(41,38,27,0.06)':'#29261b', color:btnDisabled?'rgba(41,38,27,0.55)':'#f6f2ea', border:0, borderRadius:18, fontFamily:'Newsreader,serif', fontSize:21, fontWeight:500, letterSpacing:'-0.005em', display:'flex', alignItems:'center', justifyContent:'space-between', boxShadow:btnDisabled?'none':'0 2px 0 rgba(0,0,0,0.04),0 12px 30px rgba(41,38,27,0.18)', cursor:btnDisabled?'default':'pointer', transition:'all .2s' }}>
          <span>{viewingPast?`Archiv ${year}`:checkedInToday?'Heute gestempelt':showDemo?'Demo-Modus':'Heute gebouldert'}</span>
          <span style={{ fontFamily:'system-ui', fontSize:13, opacity:0.7, fontWeight:500, letterSpacing:'.04em' }}>{viewingPast?'🔒':checkedInToday?'✓':showDemo?'–':dateFmtShort(TODAY)}</span>
        </button>
        <div style={{ fontSize:12, color:'rgba(41,38,27,0.45)', marginTop:10, textAlign:'center', fontFamily:'system-ui' }}>
          {viewingPast?`Vergangenes Jahr · ${stats.total} Besuche.`:checkedInToday?`Nice. #${stats.total} dieses Jahr.`:showDemo?`Demo · ${stats.total} Besuche angezeigt.`:`Noch ${remaining} bis zum Jahresziel.`}
        </div>
        {!showDemo&&onNachtragen&&(
          <button onClick={onNachtragen} style={{ display:'block', margin:'14px auto 0', padding:'8px 16px', background:'transparent', border:'0.5px solid rgba(41,38,27,0.2)', borderRadius:999, fontFamily:'system-ui', fontSize:13, fontWeight:500, color:'rgba(41,38,27,0.7)', cursor:'pointer' }}>＋ Vergangenen Tag nachtragen</button>
        )}
      </div>
    </div>
  );
}

  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 6px' }}>
      <div style={{ fontSize:11, letterSpacing:'.14em', textTransform:'uppercase', color:'rgba(41,38,27,0.5)', fontFamily:'system-ui', fontWeight:600 }}>{children}</div>
      <div style={{ flex:1, height:0.5, background:'rgba(41,38,27,0.12)' }}/>

}

      {badge.earnedISO&&<div style={{ fontFamily:'Newsreader,serif', fontVariantNumeric:'oldstyle-nums', fontStyle:'italic', fontSize:11, color:'rgba(41,38,27,0.5)', lineHeight:1 }}>{dateFmtShort(parseISO(badge.earnedISO))}</div>}

        </div>

function MiniHeatmap({ stats, accent, year=YEAR, levels={} }) {
  const days=new Set(stats.sortedDays);
  return (
    <div style={{ display:'grid', gridTemplateColumns:'14px repeat(31,1fr)', rowGap:2, columnGap:1 }}>

    catch { alert('Bild konnte nicht erstellt werden.'); }

  const shareCard=async()=>{

function CheckinMoment({ motion, total, todayDate, accent, onDone }) {
  const [phase, setPhase]=React.useState('in');
  React.useEffect(()=>{
    const t1=setTimeout(()=>setPhase('settle'),900);
    const t2=setTimeout(()=>setPhase('out'),2400);
    const t3=setTimeout(onDone,2900);
    return ()=>[t1,t2,t3].forEach(clearTimeout);
  },[onDone]);
  return (
    <div style={{ position:'absolute', inset:0, zIndex:200, background:'rgba(246,242,234,0.96)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity:phase==='out'?0:1, transition:'opacity .4s' }}>
      <div style={{ position:'relative', width:280, height:280 }}>
        {motion==='stamp'&&<StampMotion phase={phase} todayDate={todayDate} accent={accent}/>}
        {motion==='fill'&&<FillMotion phase={phase} todayDate={todayDate} accent={accent}/>}
        {motion==='rustle'&&<RustleMotion phase={phase} todayDate={todayDate} accent={accent}/>}
      </div>
      <div style={{ fontFamily:'Newsreader,serif', fontSize:26, fontStyle:'italic', color:'#29261b', textAlign:'center', marginTop:14, opacity:phase==='settle'?1:0, transform:phase==='settle'?'translateY(0)':'translateY(8px)', transition:'opacity .4s .2s,transform .4s .2s' }}>Nice.</div>

    </div>
  );
}

function BadgeUnlockMoment({ badge, onDone }) {
  const [phase, setPhase] = React.useState('in');
  const particles = React.useMemo(() => Array.from({ length: 32 }, (_, i) => ({
    id: i,
    left: 5 + Math.random() * 90,
    delay: Math.random() * 0.55,
    dur: 1.3 + Math.random() * 0.9,
    w: 8 + Math.random() * 8,
    h: 5 + Math.random() * 5,
    color: ['#b3543a','#6b7a4b','#4a5a6a','#7a6a4f','#a48a5b','#d4b06a','#6b4f7a'][i % 7],
  })), []);
  React.useEffect(() => {
    const t1 = setTimeout(() => setPhase('settle'), 80);
    const t2 = setTimeout(() => setPhase('out'), 3600);
    const t3 = setTimeout(onDone, 4100);
    return () => [t1, t2, t3].forEach(clearTimeout);
  }, [onDone]);
  return (
    <>
      <style>{`@keyframes sbKonfetti{0%{transform:translateY(-16px) rotate(0deg);opacity:.88}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}`}</style>
      <div onClick={onDone} style={{ position:'absolute', inset:0, zIndex:205, background:'rgba(246,242,234,0.97)', backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', opacity:phase==='out'?0:1, transition:'opacity .45s', cursor:'pointer', overflow:'hidden' }}>
        {phase!=='in' && particles.map((p) => (
          <div key={p.id} style={{ position:'absolute', top:0, left:`${p.left}%`, width:p.w, height:p.h, background:p.color, borderRadius:2, animation:`sbKonfetti ${p.dur}s ${p.delay}s ease-in both` }}/>
        ))}
        <div style={{ transform:phase==='in'?'scale(0.42) translateY(36px)':'scale(1) translateY(0)', opacity:phase==='in'?0:1, transition:'transform .55s cubic-bezier(.25,1.5,.4,1),opacity .38s', position:'relative', zIndex:1 }}>

        <div style={{ position:'relative', zIndex:1, marginTop:20, fontFamily:'system-ui', fontSize:10, letterSpacing:'.14em', textTransform:'uppercase', color:'rgba(41,38,27,0.45)', opacity:phase==='in'?0:1, transition:'opacity .4s .22s' }}>Anstecker verdient</div>
        <div style={{ position:'relative', zIndex:1, fontFamily:'Newsreader,serif', fontSize:27, fontWeight:500, color:'#29261b', letterSpacing:'-0.01em', marginTop:8, opacity:phase==='in'?0:1, transition:'opacity .4s .28s' }}>{badge.label}</div>
        <div style={{ position:'relative', zIndex:1, fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:15, color:'rgba(41,38,27,0.6)', marginTop:6, maxWidth:264, textAlign:'center', lineHeight:1.4, opacity:phase==='in'?0:1, transition:'opacity .4s .34s' }}>{badge.hint}.</div>
        <div style={{ position:'relative', zIndex:1, marginTop:32, fontSize:11, color:'rgba(41,38,27,0.3)', fontFamily:'system-ui', opacity:phase==='settle'?1:0, transition:'opacity .5s 1.4s' }}>Tippen zum Schließen</div>
      </div>
    </>
  );
}

          <button onClick={onClose} style={{ appearance:'none', border:0, background:'transparent', color:'rgba(41,38,27,0.5)', fontSize:13, fontFamily:'system-ui', cursor:'pointer' }}>überspringen</button>
        </div>
        <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:14, color:'rgba(41,38,27,0.58)', marginTop:3 }}>Optional · später jederzeit änderbar.</div>
        <div style={{ display:'flex', gap:10, marginTop:18 }}>
          {LEVEL_OPTS.map((o)=>{
            const on=currentLevel===o.v;
            return (
              <button key={o.v} type="button" onClick={()=>onPick(o.v)}
                style={{ flex:1, padding:'18px 0', borderRadius:18, border:on?`1.5px solid ${accent}`:'0.5px solid rgba(41,38,27,0.18)', background:'#fbf8f1', cursor:'pointer', display:'flex', flexDirection:'column', alignItems:'center', gap:10, boxShadow:'0 1px 0 rgba(255,255,255,0.6) inset' }}>
                <span style={{ width:26, height:26, borderRadius:'50%', background:levelColor(accent,o.v), boxShadow:'0 1px 4px rgba(41,38,27,0.18)' }}/>
                <span style={{ fontFamily:'system-ui', fontSize:14, fontWeight:500, color:'#29261b' }}>{o.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// Grade-Auswahl Bottom-Sheet (nach dem Stempeln oder im Nachtragen-Dialog)
function GradePrompt({ initial={}, onSave, onClose }) {
  const [counts, setCounts] = React.useState(initial);
  const toggle = (id) => setCounts((c) => {
    const next = ((c[id]||0) + 1) % 4;
    if (next===0) { const {[id]:_, ...rest}=c; return rest; }
    return {...c, [id]:next};
  });
  return (
    <div onClick={onClose} style={{ position:'absolute', inset:0, zIndex:215, background:'rgba(41,38,27,0.32)', display:'flex', flexDirection:'column', justifyContent:'flex-end' }}>
      <div onClick={(e)=>e.stopPropagation()} style={{ background:'#f6f2ea', borderTopLeftRadius:24, borderTopRightRadius:24, padding:'22px 20px calc(env(safe-area-inset-bottom) + 24px)', boxShadow:'0 -10px 40px rgba(41,38,27,0.22)', maxHeight:'90vh', overflowY:'auto' }}>
        <div style={{ display:'flex', alignItems:'baseline', justifyContent:'space-between', marginBottom:4 }}>
          <div style={{ fontFamily:'Newsreader,serif', fontSize:22, fontWeight:500, color:'#29261b' }}>Welche Levels heute?</div>
          <button onClick={onClose} style={{ appearance:'none', border:0, background:'transparent', color:'rgba(41,38,27,0.5)', fontSize:13, fontFamily:'system-ui', cursor:'pointer' }}>überspringen</button>
        </div>
        <div style={{ fontFamily:'Newsreader,serif', fontStyle:'italic', fontSize:13, color:'rgba(41,38,27,0.52)', marginBottom:18 }}>1× = wenig · 2× = einige · 3× = viele · 4× = zurück</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
          {GRADES.map((g)=>{
            const cnt=counts[g.id]||0, active=cnt>0;
            return (
              <button key={g.id} type="button" onClick={()=>toggle(g.id)}
                style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 13px', borderRadius:14,
                  border:active?`1.5px solid ${g.color}`:'0.5px solid rgba(41,38,27,0.14)',
                  background:active?g.color+'1a':'rgba(41,38,27,0.03)', cursor:'pointer', transition:'all .15s',
                  WebkitTapHighlightColor:'transparent' }}>
                <div style={{ width:22, height:22, borderRadius:'50%', background:g.color, flexShrink:0, border:g.id==='w'?'1px solid rgba(41,38,27,0.25)':'none', boxShadow:'0 1px 3px rgba(41,38,27,0.18)' }}/>
                <div style={{ flex:1, minWidth:0, textAlign:'left' }}>
                  <div style={{ fontFamily:'system-ui', fontSize:11, fontWeight:600, color:'#29261b', lineHeight:1.2 }}>{g.label}</div>
                  {active&&<div style={{ fontSize:10, color:'rgba(41,38,27,0.5)', marginTop:1 }}>{GRADE_COUNT_LABELS[cnt]}</div>}
                </div>
                <div style={{ display:'flex', gap:3, flexShrink:0 }}>
                  {[1,2,3].map((i)=>(
                    <div key={i} style={{ width:7, height:7, borderRadius:'50%', background:cnt>=i?g.color:'rgba(41,38,27,0.12)', border:cnt>=i&&g.id==='w'?'1px solid rgba(41,38,27,0.3)':'none', transition:'background .12s' }}/>
                  ))}
                </div>
              </button>
            );
          })}
        </div>
        <button onClick={()=>onSave(counts)} style={{ marginTop:18, width:'100%', padding:'16px 24px', background:'#29261b', color:'#f6f2ea', border:0, borderRadius:16, fontFamily:'Newsreader,serif', fontSize:18, fontWeight:500, cursor:'pointer', boxShadow:'0 8px 24px rgba(41,38,27,0.18)' }}>Speichern</button>
      </div>
    </div>
  );
}

// Mini-Kalender im Tweaks-Panel zum Nachtragen/Löschen einzelner Tage
function DayEditor({ year, checkins, accent, onToggle }) {
  const set=new Set(checkins);
  const monthNames=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const [m,setM]=React.useState(()=> year===YEAR ? new Date().getMonth() : 0);
  React.useEffect(()=>{ setM(year===YEAR ? new Date().getMonth() : 0); },[year]);
  const dim=new Date(year,m+1,0).getDate();
  const startDow=(new Date(year,m,1).getDay()+6)%7; // Montag = 0
  const todayISO=isoDay(TODAY);
  const cells=[]; for (let i=0;i<startDow;i++) cells.push(null); for (let d=1;d<=dim;d++) cells.push(d);
  const navBtn={appearance:'none',border:0,background:'rgba(0,0,0,.06)',borderRadius:6,width:24,height:22,cursor:'pointer',color:'inherit',fontSize:14,lineHeight:1,display:'flex',alignItems:'center',justifyContent:'center'};
  return (
    <div className="twk-row">
      <div className="twk-lbl" style={{justifyContent:'space-between',alignItems:'center'}}>
        <button type="button" style={{...navBtn,opacity:m===0?0.35:1}} onClick={()=>setM(Math.max(0,m-1))} disabled={m===0}>‹</button>
        <span style={{fontWeight:500}}>{monthNames[m]} {year}</span>
        <button type="button" style={{...navBtn,opacity:m===11?0.35:1}} onClick={()=>setM(Math.min(11,m+1))} disabled={m===11}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3,marginTop:5}}>
        {['M','D','M','D','F','S','S'].map((w,i)=><div key={i} style={{textAlign:'center',fontSize:9,color:'rgba(41,38,27,.4)',fontWeight:600}}>{w}</div>)}
        {cells.map((d,i)=>{
          if (d===null) return <div key={i}/>;
          const iso=`${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const hit=set.has(iso), future=iso>todayISO;
          return (
            <button key={i} type="button" disabled={future} onClick={()=>onToggle(iso)}
              style={{appearance:'none',border:hit?`1px solid ${accent}`:'1px solid transparent',borderRadius:6,height:26,padding:0,
                cursor:future?'default':'pointer',background:hit?accent:'rgba(0,0,0,.05)',
                color:hit?'#fff':(future?'rgba(41,38,27,.22)':'rgba(41,38,27,.7)'),fontSize:11,fontWeight:500,
                fontVariantNumeric:'tabular-nums',opacity:future?0.5:1}}>{d}</button>
          );
        })}
      </div>
      <div style={{fontSize:10,color:'rgba(41,38,27,.45)',marginTop:6,lineHeight:1.3}}>Tag antippen = Besuch ein/aus.</div>
    </div>
  );
}

function loadAppData() {
  try {
    return {
      checkins: JSON.parse(localStorage.getItem(`sb-checkins-${YEAR}`) || '[]'),
      levels: loadLevels(YEAR),
      routes: loadRoutes(YEAR),
      goal: JSON.parse(localStorage.getItem('sb-goal') || '40'),
      accent: localStorage.getItem('sb-accent') || '#6b6862',
      onboarded: !!localStorage.getItem('sb-onboarded'),
    };
  } catch { return { checkins:[], levels:{}, routes:{}, goal:40, accent:'#6b6862', onboarded:false }; }
}

function App() {
  const [tab, setTab]=React.useState('sammeln');
  const [viz, setViz]=React.useState('heat');
  const [motion, setMotion]=React.useState('stamp');
  const [showDemo, setShowDemo]=React.useState(false);
  const [appData, setAppData]=React.useState(loadAppData);
  const [year, setYear]=React.useState(YEAR);          // angezeigtes Jahr (Archiv-Ansicht)
  const [checkinActive, setCheckinActive]=React.useState(false);
  const [onboardingActive, setOnboardingActive]=React.useState(!loadAppData().onboarded);
  const [nachtragenOpen, setNachtragenOpen]=React.useState(false);
  const [levelPromptISO, setLevelPromptISO]=React.useState(null);
  const [newlyEarnedBadges, setNewlyEarnedBadges]=React.useState([]);
  const [gradePromptISO, setGradePromptISO]=React.useState(null);
  const [horoskopVisible, setHoroskopVisible]=React.useState(false);
  // Einmal pro Tag beim App-Öffnen anzeigen, falls Daten vorhanden
  React.useEffect(()=>{
    if (!loadAppData().onboarded) return;
    if (hasSeenHoroskopToday(isoDay(TODAY))) return;
    const t=setTimeout(()=>setHoroskopVisible(true), 900);
    return ()=>clearTimeout(t);
  },[]);
  const fileInputRef=React.useRef(null);

  // Remove loading indicator once React has mounted
  React.useEffect(() => { document.getElementById('loading')?.remove(); }, []);

  // Check-ins & Level neu laden, wenn das angezeigte Jahr wechselt
  React.useEffect(()=>{ setAppData((d)=>({...d, checkins: loadCheckins(year), levels: loadLevels(year), routes: loadRoutes(year)})); },[year]);

  const todayISO=isoDay(TODAY);

  const activeCheckins=React.useMemo(()=>{
    if (showDemo) return DEMO_CHECKINS;
    return appData.checkins;
  },[showDemo,appData.checkins]);
  const activeLevels = showDemo ? {} : appData.levels;

  const stats=React.useMemo(()=>computeStats(activeCheckins),[activeCheckins]);
  const badges=React.useMemo(()=>earnedBadges(stats),[stats]);
  const checkedInToday=activeCheckins.includes(todayISO);

  const onCheckin=()=>{ if (!showDemo && !checkedInToday && year===YEAR) setCheckinActive(true); };
  const onCheckinDone=()=>{
    setCheckinActive(false);
    if (!showDemo && !checkedInToday) {
      const next=[...new Set([...appData.checkins,todayISO])];
      const prevEarned=new Set(earnedBadges(stats).filter((b)=>b.earned).map((b)=>b.id));
      const justEarned=earnedBadges(computeStats(next)).filter((b)=>b.earned&&!prevEarned.has(b.id));
      localStorage.setItem(`sb-checkins-${YEAR}`,JSON.stringify(next));
      setAppData((d)=>({...d,checkins:next}));
      // Horoskop nach Check-in zeigen wenn heute noch nicht gesehen
      if (!hasSeenHoroskopToday(todayISO)) setHoroskopVisible(true);
      if (justEarned.length>0) setNewlyEarnedBadges(justEarned);
      else if (hasSeenHoroskopToday(todayISO)) setLevelPromptISO(todayISO);
    }
  };

  const onBadgeUnlockDone=()=>{
    const rest=newlyEarnedBadges.slice(1);
    setNewlyEarnedBadges(rest);
    if (rest.length===0 && hasSeenHoroskopToday(todayISO)) setLevelPromptISO(todayISO);
  };

  const onHoroskopDone=()=>{
    setHoroskopVisible(false);
    // Nach Horoskop: LevelPrompt falls Check-in heute war und noch nicht gezeigt
    if (checkedInToday && newlyEarnedBadges.length===0) setLevelPromptISO(todayISO);
  };

  // Anstrengungs-Stufe eines Tages setzen (sparse: 'normal' = kein Eintrag)
  const setDayLevel=(iso, level)=>{
    const map={...loadLevels(year)};
    if (level==='normal') delete map[iso]; else map[iso]=level;
    if (Object.keys(map).length) localStorage.setItem(`sb-levels-${year}`,JSON.stringify(map));
    else localStorage.removeItem(`sb-levels-${year}`);
    setAppData((d)=>({...d,levels:map}));
  };

  const setDayRoutes=(iso, counts)=>{
    const map={...loadRoutes(year)};
    if (counts&&Object.keys(counts).length) map[iso]=counts; else delete map[iso];
    if (Object.keys(map).length) localStorage.setItem(`sb-routes-${year}`,JSON.stringify(map));
    else localStorage.removeItem(`sb-routes-${year}`);
    setAppData((d)=>({...d,routes:map}));
  };

  const setGoal=(goal)=>{
    localStorage.setItem('sb-goal',JSON.stringify(goal));
    setAppData((d)=>({...d,goal}));
  };
  const setAccent=(accent)=>{
    localStorage.setItem('sb-accent',accent);
    setAppData((d)=>({...d,accent}));
  };
  // Einzelnen Tag im angezeigten Jahr nachtragen/löschen
  const toggleDay=(iso)=>{
    const cur=new Set(loadCheckins(year));
    const removing=cur.has(iso);
    if (removing) cur.delete(iso); else cur.add(iso);
    const next=[...cur].sort();
    localStorage.setItem(`sb-checkins-${year}`,JSON.stringify(next));
    // beim Entfernen auch die Stufe löschen
    let map=loadLevels(year);
    if (removing && map[iso]) { map={...map}; delete map[iso];
      if (Object.keys(map).length) localStorage.setItem(`sb-levels-${year}`,JSON.stringify(map)); else localStorage.removeItem(`sb-levels-${year}`);
    }
    setAppData((d)=>({...d,checkins:next,levels:map}));
  };

  // Backup: alle sb-* Schlüssel als JSON-Datei herunterladen
  const exportData=()=>{
    const data={};
    for (let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if (k && k.startsWith('sb-')) data[k]=localStorage.getItem(k); }
    const payload={ app:'sammelbuch', version:1, exportedAt:new Date().toISOString(), data };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`sammelbuch-backup-${isoDay(TODAY)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  };

  // Backup einlesen: sb-* Schlüssel überschreiben und Ansicht neu laden
  const importData=(file)=>{
    const r=new FileReader();
    r.onload=()=>{
      try {
        const parsed=JSON.parse(r.result);
        const d=parsed.data||parsed;
        let n=0;
        Object.entries(d).forEach(([k,v])=>{ if (k.startsWith('sb-')){ localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); n++; } });
        if (!n) { alert('Keine Sammelbuch-Daten in der Datei gefunden.'); return; }
        const fresh=loadAppData();
        setAppData({...fresh, checkins:loadCheckins(year), levels:loadLevels(year)});
        setOnboardingActive(false);
        alert(`Backup geladen ✓ (${n} Einträge)`);
      } catch { alert('Konnte die Datei nicht lesen. Ist es ein Sammelbuch-Backup?'); }
    };
    r.readAsText(file);
  };

  const resetAll=()=>{
    if (!confirm(`Wirklich alle Daten für ${year} zurücksetzen? Mach vorher ein Backup.`)) return;
    localStorage.removeItem(`sb-checkins-${year}`);
    localStorage.removeItem(`sb-levels-${year}`);
    if (year===YEAR) {
      localStorage.removeItem('sb-goal');
      localStorage.removeItem('sb-accent');
      localStorage.removeItem('sb-onboarded');
      setAppData({checkins:[],levels:{},goal:40,accent:'#6b6862',onboarded:false});
      setOnboardingActive(true);
    } else {
      setAppData((d)=>({...d,checkins:[],levels:{}}));
    }
  };

  const years=availableYears();

  return (
    <IOSDevice>
      <input ref={fileInputRef} type="file" accept="application/json,.json" style={{display:'none'}}
        onChange={(e)=>{ const f=e.target.files&&e.target.files[0]; if (f) importData(f); e.target.value=''; }}/>
      <div style={{ position:'absolute', inset:0, background:'#f6f2ea', color:'#29261b', overflow:'hidden' }}>
        <div style={{ position:'absolute', inset:0, overflowY:'auto', overflowX:'hidden', WebkitOverflowScrolling:'touch' }}>
          {tab==='sammeln'&&<SammelnScreen stats={stats} accent={appData.accent} viz={viz} setViz={setViz} goal={appData.goal} onCheckin={onCheckin} checkedInToday={checkedInToday} todayISO={todayISO} showDemo={showDemo} year={year} levels={activeLevels} routes={showDemo?{}:appData.routes} onToggleDay={toggleDay} onSetLevel={setDayLevel} onNachtragen={()=>setNachtragenOpen(true)}/>}
          {tab==='erfolge'&&<ErfolgeScreen stats={stats} badges={badges}/>}
          {tab==='jahr'&&<JahrScreen stats={stats} badges={badges} accent={appData.accent} year={year} levels={activeLevels}/>}
        </div>
        <BottomNav tab={tab} setTab={setTab}/>
        {checkinActive&&<CheckinMoment motion={motion} total={stats.total+(checkedInToday?0:1)} todayDate={TODAY} accent={appData.accent} onDone={onCheckinDone}/>}
        {horoskopVisible&&<HoroskopMoment stats={stats} todayISO={todayISO} onDone={onHoroskopDone}/>}
        {newlyEarnedBadges.length>0&&<BadgeUnlockMoment badge={newlyEarnedBadges[0]} onDone={onBadgeUnlockDone}/>}
        {onboardingActive&&<Onboarding accent={appData.accent} onDone={(goal)=>{ setGoal(goal); localStorage.setItem('sb-onboarded','1'); setAppData((d)=>({...d,onboarded:true,goal})); setOnboardingActive(false); }}/>}
        {nachtragenOpen&&<NachtragenDialog year={year} checkins={appData.checkins} accent={appData.accent} levels={appData.levels} routes={appData.routes} onToggle={toggleDay} onSetLevel={setDayLevel} onSetRoutes={setDayRoutes} onClose={()=>setNachtragenOpen(false)}/>}
        {levelPromptISO&&<LevelPrompt accent={appData.accent} currentLevel={appData.levels[levelPromptISO]||'normal'} onPick={(lv)=>{ setDayLevel(levelPromptISO,lv); setLevelPromptISO(null); setGradePromptISO(todayISO); }} onClose={()=>{ setLevelPromptISO(null); setGradePromptISO(todayISO); }}/>}
        {gradePromptISO&&<GradePrompt initial={appData.routes[gradePromptISO]||{}} onSave={(counts)=>{ setDayRoutes(gradePromptISO,counts); setGradePromptISO(null); }} onClose={()=>setGradePromptISO(null)}/>}
      </div>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Stil">
          <TweakColor label="Akzent" value={appData.accent} options={ACCENT_OPTIONS} onChange={setAccent}/>
        </TweakSection>
        <TweakSection label="Visualisierung">
          <TweakRadio label="Ansicht" value={viz} options={[{value:'heat',label:'Jahr'},{value:'month',label:'Monat'}]} onChange={setViz}/>
          <TweakSlider label="Jahresziel" value={appData.goal} min={10} max={120} step={5} unit=" Bes." onChange={setGoal}/>
        </TweakSection>
        <TweakSection label="Check-in">
          <TweakRadio label="Animation" value={motion} options={[{value:'stamp',label:'Stempel'},{value:'fill',label:'Füllen'},{value:'rustle',label:'Rascheln'}]} onChange={setMotion}/>
        </TweakSection>
        {years.length>1&&(
          <TweakSection label="Jahr">
            <TweakRadio label="Anzeigen" value={year} options={years.map((y)=>({value:y,label:String(y)}))} onChange={setYear}/>
          </TweakSection>
        )}
        <TweakSection label="Tage nachtragen">
          <DayEditor year={year} checkins={appData.checkins} accent={appData.accent} onToggle={toggleDay}/>
        </TweakSection>
        <TweakSection label="Daten">
          <TweakButton label="Backup sichern (Download)" secondary onClick={exportData}/>
          <TweakButton label="Backup laden" secondary onClick={()=>fileInputRef.current&&fileInputRef.current.click()}/>
          <TweakToggle label="Demo-Daten anzeigen" value={showDemo} onChange={setShowDemo}/>
          <TweakButton label={`${year} zurücksetzen`} secondary onClick={resetAll}/>
        </TweakSection>
      </TweaksPanel>
    </IOSDevice>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
