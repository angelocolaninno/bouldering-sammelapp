<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Parchment background -->
  <rect width="512" height="512" rx="108" fill="#efe9dc"/>

  <!-- Mountain silhouette: main peak -->
  <path d="M256 96 L400 352 H112 Z" fill="#29261b"/>
  <!-- Second smaller peak (right) -->
  <path d="M372 180 L460 352 H284 Z" fill="#3d3929"/>

  <!-- Snow cap on main peak -->
  <path d="M256 96 L292 172 L256 156 L220 172 Z" fill="#f6f2ea"/>

  <!-- Decorative dashed border ring -->
  <circle cx="256" cy="256" r="218" fill="none" stroke="#29261b" stroke-width="7" stroke-dasharray="16 10" opacity="0.3"/>

  <!-- Thin inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#29261b" stroke-width="1.5" opacity="0.15"/>

  <!-- "SB" monogram -->
  <text x="256" y="420" font-family="Georgia, serif" font-size="54" font-weight="600"
        text-anchor="middle" fill="#29261b" letter-spacing="16" opacity="0.7">SB</text>
</svg>
